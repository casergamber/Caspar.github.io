<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IronLog</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
[data-theme="dark"]{--bg:#0d0d0f;--bg2:#141418;--bg3:#1c1c22;--card:#18181e;--card2:#202028;--accent:#e8ff47;--at:#000;--text:#f0f0f0;--t2:#909099;--t3:#55555f;--border:rgba(255,255,255,0.07);--b2:rgba(255,255,255,0.13);--green:#39e07a;--red:#ff4d6d;--gold:#ffc94d;--cg:rgba(255,255,255,0.05);--ct:rgba(255,255,255,0.3)}
[data-theme="light"]{--bg:#f2f2f5;--bg2:#fff;--bg3:#e8e8ee;--card:#fff;--card2:#f8f8fb;--accent:#4a3ff7;--at:#fff;--text:#111118;--t2:#5a5a6a;--t3:#aaaabc;--border:rgba(0,0,0,0.08);--b2:rgba(0,0,0,0.14);--green:#16a84a;--red:#e02040;--gold:#d4820a;--cg:rgba(0,0,0,0.06);--ct:rgba(0,0,0,0.35)}
*{box-sizing:border-box;margin:0;padding:0;transition:background-color 0.2s,color 0.2s,border-color 0.2s}
body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.top-bar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 1.25rem;display:flex;align-items:center;justify-content:space-between;height:58px;position:sticky;top:0;z-index:100}
.logo-wrap{display:flex;align-items:center;gap:10px}
.logo-icon{width:38px;height:38px;background:var(--accent);border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-text{font-family:'Barlow Condensed',sans-serif;font-size:23px;font-weight:900;letter-spacing:0.04em;color:var(--text)}
.logo-text span{color:var(--accent)}
.top-actions{display:flex;align-items:center;gap:8px}
.icon-btn{width:34px;height:34px;border-radius:9px;border:1px solid var(--b2);background:transparent;color:var(--t2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
.icon-btn:hover{border-color:var(--accent);color:var(--accent)}
.export-btn{padding:7px 12px;background:transparent;border:1px solid var(--b2);border-radius:9px;color:var(--t2);font-size:12px;font-weight:600;cursor:pointer;font-family:'Barlow',sans-serif;transition:all 0.15s}
.export-btn:hover{border-color:var(--accent);color:var(--accent)}
.streak-bar{background:var(--bg2);border-bottom:1px solid var(--border);padding:10px 1.25rem;display:flex;align-items:center;gap:16px;overflow-x:auto}
.streak-info{display:flex;align-items:center;gap:10px;flex-shrink:0}
.streak-flames{display:flex;gap:2px;align-items:center}
.flame-icon{font-size:20px;animation:flicker 1.5s ease-in-out infinite alternate}
@keyframes flicker{0%{opacity:1;transform:scale(1) rotate(-3deg)}100%{opacity:.85;transform:scale(1.1) rotate(3deg)}}
.streak-count{font-family:'Barlow Condensed',sans-serif;font-size:30px;font-weight:900;color:var(--accent);line-height:1}
.streak-sub{font-size:11px;color:var(--t3);font-weight:600;text-transform:uppercase;letter-spacing:.04em;line-height:1.4}
.week-days{display:flex;gap:6px;flex:1;justify-content:flex-end}
.day-dot{display:flex;flex-direction:column;align-items:center;gap:3px;min-width:36px}
.day-name{font-size:10px;color:var(--t3);font-weight:700;text-transform:uppercase}
.day-circle{width:32px;height:32px;border-radius:50%;border:1.5px solid var(--b2);display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer;transition:all 0.15s;background:var(--bg3);color:var(--t3);font-weight:700;font-family:'Barlow Condensed',sans-serif}
.day-circle.gym{background:var(--accent);border-color:var(--accent);color:var(--at)}
.day-circle.rest{border-color:#ff6b35;color:#ff6b35}
.day-circle.today{box-shadow:0 0 0 2px #7c5cfc}
.main{max-width:680px;margin:0 auto;padding:1.25rem}
/* NAV PILLS */
.nav-pills{display:flex;gap:6px;margin-bottom:1.25rem;flex-wrap:wrap}
.nav-pill{padding:7px 16px;border-radius:20px;border:1px solid var(--b2);background:transparent;color:var(--t2);font-size:13px;font-weight:600;cursor:pointer;font-family:'Barlow',sans-serif;transition:all 0.15s}
.nav-pill.active{background:var(--accent);color:var(--at);border-color:var(--accent)}
/* PAGE SECTIONS */
.page{display:none}.page.active{display:block}
/* OVERVIEW */
.overview-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:1.25rem}
.ov-label{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px}
.ov-wrap{height:90px}
/* DAY TABS */
.day-tabs{display:flex;gap:0;background:var(--bg2);border-radius:12px;border:1px solid var(--border);padding:4px;margin-bottom:1.25rem}
.day-tab{flex:1;padding:10px 8px;border-radius:9px;border:none;font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:800;letter-spacing:.06em;cursor:pointer;background:transparent;color:var(--t2);transition:all 0.15s;text-transform:uppercase}
.day-tab.active{background:var(--accent);color:var(--at)}
/* TIMERS */
.timer-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1.25rem}
.timer-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 16px}
.tc-label{font-size:10px;color:var(--t3);font-weight:700;text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px}
.tc-val{font-family:'Barlow Condensed',sans-serif;font-size:34px;font-weight:900;color:var(--accent);letter-spacing:.04em;margin-bottom:8px;line-height:1}
.tc-val.neutral{color:var(--text)}.tc-val.done{color:var(--green)}
.tc-prog{height:3px;background:var(--bg3);border-radius:2px;margin-bottom:10px;overflow:hidden}
.tc-fill{height:100%;background:var(--accent);border-radius:2px;transition:width 0.5s linear}
.tc-btns{display:flex;gap:6px}
.tc-btn{padding:7px 13px;border-radius:8px;border:1px solid var(--b2);background:transparent;color:var(--t2);font-size:11px;font-weight:700;cursor:pointer;font-family:'Barlow',sans-serif;text-transform:uppercase;letter-spacing:.05em;transition:all 0.15s}
.tc-btn:hover{border-color:var(--accent);color:var(--accent)}
.tc-btn.go{background:var(--accent);color:var(--at);border-color:var(--accent)}
.tc-btn.stop{background:var(--red);color:#fff;border-color:var(--red)}
/* EXERCISE CARDS */
.ex-card{background:var(--card);border:1px solid var(--border);border-radius:14px;margin-bottom:10px;overflow:hidden;transition:border-color 0.2s}
.ex-card.completed{border-color:rgba(57,224,122,0.35)}
.ex-header{display:flex;align-items:center;gap:10px;padding:14px 16px;cursor:pointer;user-select:none;transition:background 0.15s}
.ex-header:hover{background:var(--card2)}
.ex-name{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;color:var(--text);letter-spacing:.03em;flex:1}
.pr-badge{font-size:10px;font-weight:800;color:var(--gold);background:rgba(255,201,77,0.12);border:1px solid rgba(255,201,77,0.3);padding:2px 7px;border-radius:6px;letter-spacing:.05em;display:none}
.ex-pill{font-size:11px;font-weight:700;color:var(--t3);background:var(--bg3);padding:3px 10px;border-radius:20px;white-space:nowrap}
.ex-pill.done{color:var(--green);background:rgba(57,224,122,0.1)}
.chevron{width:16px;height:16px;color:var(--t3);transition:transform 0.2s;flex-shrink:0}
.chevron.open{transform:rotate(180deg)}
.ex-body{display:none;border-top:1px solid var(--border)}.ex-body.open{display:block}
.chart-area{padding:14px 16px 0}
.chart-label{font-size:10px;color:var(--t3);font-weight:700;text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px}
.chart-con{height:70px}
.chart-nodata{font-size:12px;color:var(--t3);padding:20px 0;text-align:center;font-style:italic}
.sets-area{padding:12px 16px}
.set-row{display:grid;grid-template-columns:26px 26px 76px 1fr;gap:6px;align-items:center;margin-bottom:7px;padding:8px 10px;border-radius:10px;background:var(--bg3);border:1px solid transparent;transition:all 0.2s}
.set-row.checked{background:rgba(57,224,122,0.05);border-color:rgba(57,224,122,0.18)}
.set-check{width:22px;height:22px;border-radius:6px;border:1.5px solid var(--b2);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.15s}
.set-check.done{background:var(--green);border-color:var(--green)}
.set-num{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;color:var(--t3);text-align:center}
.ig{display:flex;flex-direction:column;gap:2px}
.ig-label{font-size:10px;color:var(--t3);font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.stepper{display:flex;align-items:center;gap:3px}
.sbtn{width:24px;height:26px;border:1px solid var(--b2);background:var(--card);border-radius:6px;cursor:pointer;font-size:10px;font-weight:700;color:var(--t2);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.15s;font-family:'Barlow',sans-serif}
.sbtn:hover{border-color:var(--accent);color:var(--accent)}
.sbtn.big{width:28px}
.vi{width:40px;height:26px;text-align:center;border:1px solid var(--b2);border-radius:6px;font-size:13px;font-weight:600;background:var(--bg2);color:var(--text);padding:0;font-family:'Barlow',sans-serif}
.vi:focus{outline:none;border-color:var(--accent)}
.vi.reps{width:48px}
.set-mgmt{display:flex;gap:8px;padding:2px 16px 12px}
.smb{padding:6px 14px;border-radius:8px;border:1px dashed var(--b2);background:transparent;color:var(--t3);font-size:12px;font-weight:600;cursor:pointer;transition:all 0.15s;font-family:'Barlow',sans-serif}
.smb:hover{border-color:var(--accent);color:var(--accent)}
.smb.del:hover{border-color:var(--red);color:var(--red)}
.notes-area{padding:2px 16px 14px}
.notes-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:10px;color:var(--t2);font-size:13px;font-family:'Barlow',sans-serif;padding:9px 12px;resize:none;min-height:48px;transition:border-color 0.15s}
.notes-input::placeholder{color:var(--t3)}
.notes-input:focus{outline:none;border-color:#7c5cfc}
.save-btn{width:100%;margin-top:1.25rem;padding:15px;background:var(--accent);color:var(--at);border:none;border-radius:14px;font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:900;letter-spacing:.07em;cursor:pointer;text-transform:uppercase;transition:all 0.15s;display:flex;align-items:center;justify-content:center;gap:8px}
.save-btn:hover{opacity:.88;transform:translateY(-1px)}
/* HISTORY */
.history-section{margin-top:2rem}
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.sec-title{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:900;letter-spacing:.06em;color:var(--text);text-transform:uppercase}
.hist-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:8px}
.hist-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.hist-day{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:800;color:var(--accent);letter-spacing:.04em}
.hist-date{font-size:12px;color:var(--t3)}
.hist-del{width:26px;height:26px;border-radius:7px;border:1px solid transparent;background:transparent;color:var(--t3);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;font-size:13px}
.hist-del:hover{border-color:var(--red);color:var(--red)}
.hist-row{display:flex;justify-content:space-between;font-size:12px;padding:2px 0;color:var(--t2)}
.hist-row span:last-child{color:var(--t3)}
/* MUSCLE PAGE */
.muscle-body-row{display:flex;gap:16px;align-items:flex-start;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px}
.muscle-legend{display:flex;flex-direction:column;gap:8px;flex:1}
.leg-row{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--t2)}
.leg-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0}
.muscle-bars-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px}
.mbar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.mbar-row:last-child{margin-bottom:0}
.mbar-label{font-size:13px;color:var(--t2);width:90px;flex-shrink:0}
.mbar-bg{flex:1;height:8px;background:var(--bg3);border-radius:4px;overflow:hidden}
.mbar-fill{height:100%;border-radius:4px;transition:width 0.5s}
.mbar-num{font-size:12px;font-weight:700;color:var(--text);min-width:24px;text-align:right}
/* MANAGE PAGE */
.manage-tabs{display:flex;gap:0;background:var(--bg2);border-radius:12px;border:1px solid var(--border);padding:4px;margin-bottom:1.25rem}
.manage-tab{flex:1;padding:9px 8px;border-radius:9px;border:none;font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;cursor:pointer;background:transparent;color:var(--t2);transition:all 0.15s;text-transform:uppercase}
.manage-tab.active{background:var(--accent);color:var(--at)}
.ex-edit-card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:10px}
.ex-edit-row{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--border);transition:background 0.15s}
.ex-edit-row:last-child{border-bottom:none}
.ex-edit-row.dragging{opacity:.4;background:var(--card2)}
.ex-edit-row.drag-over{background:rgba(232,255,71,0.06);border-color:rgba(232,255,71,0.2)}
.drag-handle{display:flex;flex-direction:column;gap:3.5px;cursor:grab;flex-shrink:0;padding:2px}
.drag-line{width:16px;height:1.5px;background:var(--t3);border-radius:1px}
.ex-edit-name{flex:1;font-size:14px;font-weight:600;color:var(--text);background:transparent;border:none;font-family:'Barlow',sans-serif;padding:0}
.ex-edit-name:focus{outline:none}
.ex-edit-name.editing{background:var(--bg3);border:1px solid var(--accent);border-radius:7px;padding:4px 8px;color:var(--text)}
.edit-actions{display:flex;gap:6px;flex-shrink:0}
.eabtn{width:28px;height:28px;border-radius:7px;border:1px solid var(--b2);background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.15s;color:var(--t2)}
.eabtn:hover{border-color:var(--accent);color:var(--accent)}
.eabtn.save-edit{border-color:var(--accent);color:var(--accent)}
.eabtn.del-ex:hover{border-color:var(--red);color:var(--red)}
.add-ex-row{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;border-top:1px solid var(--border);transition:background 0.15s}
.add-ex-row:hover{background:var(--card2)}
.add-ex-icon{width:28px;height:28px;border-radius:7px;background:var(--accent);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.add-ex-label{font-size:13px;color:var(--t3);font-weight:600}
.add-ex-input{flex:1;background:var(--bg3);border:1px solid var(--accent);border-radius:8px;color:var(--text);font-size:13px;font-family:'Barlow',sans-serif;padding:6px 10px;display:none}
.add-ex-input:focus{outline:none}
/* MUSCLE ASSIGN */
.muscle-assign{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.mg-pill{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid var(--b2);background:transparent;color:var(--t3);transition:all 0.15s;font-family:'Barlow',sans-serif}
.mg-pill.selected{background:var(--accent);color:var(--at);border-color:var(--accent)}
/* TOAST / MODAL */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:var(--accent);color:var(--at);padding:11px 24px;border-radius:12px;font-size:13px;font-weight:800;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:999;font-family:'Barlow Condensed',sans-serif;letter-spacing:.06em;text-transform:uppercase;white-space:nowrap}
.toast.show{opacity:1}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:200;display:none;align-items:center;justify-content:center;padding:1rem}
.modal-bg.open{display:flex}
.modal{background:var(--card);border:1px solid var(--b2);border-radius:16px;padding:1.5rem;max-width:320px;width:100%;text-align:center}
.modal h3{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;color:var(--text);margin-bottom:8px}
.modal p{font-size:14px;color:var(--t2);margin-bottom:20px;line-height:1.5}
.modal-btns{display:flex;gap:10px;justify-content:center}
.mbtn{padding:10px 22px;border-radius:10px;border:1px solid var(--b2);background:transparent;color:var(--t2);font-size:14px;font-weight:600;cursor:pointer;font-family:'Barlow',sans-serif;transition:all 0.15s}
.mbtn.confirm{background:var(--red);color:#fff;border-color:var(--red)}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}
</style>
</head>
<body>

<div class="top-bar">
  <div class="logo-wrap">
    <div class="logo-icon">
      <svg width="26" height="20" viewBox="0 0 26 20" fill="none">
        <rect x="0" y="5" width="3" height="10" rx="1.5" fill="#000"/>
        <rect x="3" y="3" width="3" height="14" rx="1.5" fill="#000"/>
        <rect x="6" y="6" width="14" height="8" rx="1.5" fill="#000"/>
        <rect x="20" y="3" width="3" height="14" rx="1.5" fill="#000"/>
        <rect x="23" y="5" width="3" height="10" rx="1.5" fill="#000"/>
      </svg>
    </div>
    <span class="logo-text">Iron<span>Log</span></span>
  </div>
  <div class="top-actions">
    <button class="icon-btn" onclick="toggleTheme()" id="theme-btn">
      <svg id="theme-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
    </button>
    <button class="export-btn" onclick="exportCSV()">CSV Export</button>
  </div>
</div>

<div class="streak-bar">
  <div class="streak-info">
    <div class="streak-flames" id="streak-flames"></div>
    <div>
      <div class="streak-count" id="streak-num">0</div>
      <div class="streak-sub">Wochen<br>Streak</div>
    </div>
  </div>
  <div class="week-days" id="week-days"></div>
</div>

<div class="main">
  <div class="nav-pills">
    <button class="nav-pill active" onclick="showPage('workout')">Workout</button>
    <button class="nav-pill" onclick="showPage('muscles')">Muskelgruppen</button>
    <button class="nav-pill" onclick="showPage('manage')">Ubungen</button>
    <button class="nav-pill" onclick="showPage('history')">Verlauf</button>
  </div>

  <!-- WORKOUT PAGE -->
  <div class="page active" id="page-workout">
    <div class="overview-card">
      <div class="ov-label" id="ov-label">Push — Gesamtvolumen</div>
      <div class="ov-wrap"><canvas id="ov-chart"></canvas></div>
    </div>
    <div class="day-tabs">
      <button class="day-tab active" onclick="switchDay('push')">Push</button>
      <button class="day-tab" onclick="switchDay('pull')">Pull</button>
      <button class="day-tab" onclick="switchDay('beine')">Beine</button>
    </div>
    <div class="timer-row">
      <div class="timer-card">
        <div class="tc-label">Workout-Zeit</div>
        <div class="tc-val neutral" id="wt-display">00:00</div>
        <div class="tc-btns">
          <button class="tc-btn go" id="wt-btn" onclick="toggleWT()">Start</button>
          <button class="tc-btn" onclick="resetWT()">Reset</button>
        </div>
      </div>
      <div class="timer-card">
        <div class="tc-label">Pause</div>
        <div class="tc-val" id="pause-display">3:00</div>
        <div class="tc-prog"><div class="tc-fill" id="pause-fill" style="width:100%"></div></div>
        <div class="tc-btns">
          <button class="tc-btn go" id="pause-btn" onclick="togglePause()">Start</button>
          <button class="tc-btn" onclick="resetPause()">Reset</button>
        </div>
      </div>
    </div>
    <div id="workout-content"></div>
    <button class="save-btn" onclick="saveWorkout()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
      Einheit speichern
    </button>
  </div>

  <!-- MUSCLE PAGE -->
  <div class="page" id="page-muscles">
    <div class="muscle-body-row" id="muscle-body-row"></div>
    <div class="muscle-bars-card" id="muscle-bars"></div>
  </div>

  <!-- MANAGE PAGE -->
  <div class="page" id="page-manage">
    <div class="manage-tabs">
      <button class="manage-tab active" onclick="switchManageDay('push')">Push</button>
      <button class="manage-tab" onclick="switchManageDay('pull')">Pull</button>
      <button class="manage-tab" onclick="switchManageDay('beine')">Beine</button>
    </div>
    <div id="manage-content"></div>
  </div>

  <!-- HISTORY PAGE -->
  <div class="page" id="page-history">
    <div class="sec-head"><span class="sec-title">Letzte Einheiten</span></div>
    <div id="history-list"></div>
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <h3>Einheit loschen?</h3>
    <p>Diese Einheit wird dauerhaft entfernt.</p>
    <div class="modal-btns">
      <button class="mbtn" onclick="closeModal()">Abbrechen</button>
      <button class="mbtn confirm" onclick="confirmDelete()">Loschen</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
// ── DATA ──────────────────────────────────────────────────────────
const MUSCLE_COLORS = {
  'Brust':'#e8ff47','Schultern':'#e8ff47','Trizeps':'#ff6b35',
  'Ruecken':'#7c5cfc','Bizeps':'#7c5cfc','Beine':'#39e07a',
  'Bauch':'#909099','Waden':'#39e07a'
};
const DEFAULT_DAYS = {
  push:{name:'Push',exercises:[
    {name:'Brustpresse',unit:'kg',muscles:['Brust','Schultern','Trizeps']},
    {name:'Butterfly',unit:'kg',muscles:['Brust']},
    {name:'Brustpresse (positiv)',unit:'kg',muscles:['Brust','Schultern']},
    {name:'Schulterpresse',unit:'kg',muscles:['Schultern','Trizeps']},
    {name:'Seitheben am Kabelzug',unit:'kg',muscles:['Schultern']},
    {name:'Trizepsdruecken Kabelzug',unit:'kg',muscles:['Trizeps']},
    {name:'Dips (Maschine)',unit:'kg',muscles:['Trizeps','Brust']}
  ]},
  pull:{name:'Pull',exercises:[
    {name:'Rudermaschine',unit:'kg',muscles:['Ruecken','Bizeps']},
    {name:'Klimmzuge (Maschine)',unit:'kg',muscles:['Ruecken','Bizeps']},
    {name:'Latzug (enger Griff)',unit:'kg',muscles:['Ruecken','Bizeps']},
    {name:'Butterfly reverse',unit:'kg',muscles:['Ruecken','Schultern']},
    {name:'Hammer-Curls Kabelzug',unit:'kg',muscles:['Bizeps']},
    {name:'Bizeps-Curls Kurzhanteln',unit:'kg',muscles:['Bizeps']},
    {name:'Sit-Ups',unit:'',muscles:['Bauch']}
  ]},
  beine:{name:'Beine',exercises:[
    {name:'Beinstrecker',unit:'kg',muscles:['Beine']},
    {name:'Beinpresse',unit:'kg',muscles:['Beine']},
    {name:'Beinbeuger',unit:'kg',muscles:['Beine']},
    {name:'Ausfallschritte',unit:'kg',muscles:['Beine']},
    {name:'Adduktoren (Maschine)',unit:'kg',muscles:['Beine']},
    {name:'Abduktoren (Maschine)',unit:'kg',muscles:['Beine']},
    {name:'Wadenheben (stehend)',unit:'kg',muscles:['Waden']}
  ]}
};
const ALL_MUSCLES = ['Brust','Schultern','Trizeps','Ruecken','Bizeps','Beine','Bauch','Waden'];

function loadDays(){
  const saved = localStorage.getItem('il_days');
  if(saved){try{return JSON.parse(saved);}catch(e){}}
  return JSON.parse(JSON.stringify(DEFAULT_DAYS));
}
function saveDays(){localStorage.setItem('il_days', JSON.stringify(DAYS));}

let DAYS = loadDays();
let currentDay = 'push', manageDay = 'push';
let state = {}, openCards = {}, charts = {};
let deleteIndex = null, ovChart = null;

// ── THEME ─────────────────────────────────────────────────────────
function toggleTheme(){
  const h = document.documentElement;
  const dark = h.getAttribute('data-theme')==='dark';
  h.setAttribute('data-theme', dark?'light':'dark');
  localStorage.setItem('il_theme', dark?'light':'dark');
  updateThemeIcon();
  setTimeout(()=>{ drawOvChart(); Object.keys(openCards).forEach(k=>{ if(openCards[k]){ const [d,i]=k.split('-'); drawChart(d,parseInt(i)); }}); }, 250);
}
function updateThemeIcon(){
  const dark = document.documentElement.getAttribute('data-theme')==='dark';
  document.getElementById('theme-icon').innerHTML = dark
    ? '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>'
    : '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
}

// ── NAVIGATION ────────────────────────────────────────────────────
function showPage(name){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-pill').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  document.querySelectorAll('.nav-pill').forEach(p=>{ if(p.textContent.toLowerCase().includes(name.substring(0,4))) p.classList.add('active'); });
  if(name==='workout'){ Object.values(charts).forEach(c=>{try{c.destroy();}catch(e){}}); charts={}; openCards={}; render(); setTimeout(drawOvChart,80); }
  if(name==='muscles') renderMusclePage();
  if(name==='manage') renderManage();
  if(name==='history') renderHistory();
}

// ── STATE ─────────────────────────────────────────────────────────
function loadLastWeights(day){
  const saved = JSON.parse(localStorage.getItem('il_history')||'[]');
  const last = saved.find(s=>s.day===DAYS[day].name);
  if(!last) return;
  DAYS[day].exercises.forEach((ex,ei)=>{
    const lx = last.exercises&&last.exercises.find(e=>e.name===ex.name);
    if(!lx) return;
    lx.sets.forEach((s,si)=>{ if(state[day][ei]&&state[day][ei].sets[si]){ state[day][ei].sets[si].weight=s.weight||20; state[day][ei].sets[si].reps=s.reps||10; } });
  });
}
function initState(day){
  if(state[day]) return;
  state[day] = DAYS[day].exercises.map(ex=>({ sets: Array.from({length:3},()=>({weight:20,reps:10,done:false})), note:'' }));
  loadLastWeights(day);
}
function switchDay(day){
  currentDay = day;
  document.querySelectorAll('.day-tab').forEach((t,i)=>t.classList.toggle('active',['push','pull','beine'][i]===day));
  Object.values(charts).forEach(c=>{try{c.destroy();}catch(e){}});
  charts = {};
  initState(day); render();
  document.getElementById('ov-label').textContent = DAYS[day].name+' — Gesamtvolumen';
  setTimeout(drawOvChart, 80);
}

// ── RENDER EXERCISES ──────────────────────────────────────────────
function render(){
  const day = currentDay;
  let html = '';
  DAYS[day].exercises.forEach((ex,ei)=>{
    const key = day+'-'+ei;
    const sets = state[day][ei].sets;
    const done = sets.filter(s=>s.done).length, total = sets.length;
    html += `<div class="ex-card${done===total&&total>0?' completed':''}" id="card-${key}">
      <div class="ex-header" onclick="toggleCard('${day}',${ei})">
        <span class="ex-name">${ex.name}</span>
        <div style="display:flex;align-items:center;gap:8px">
          <span class="pr-badge" id="pr-${key}">PR</span>
          <span class="ex-pill${done===total?' done':''}" id="pill-${key}">${done}/${total} Satze</span>
        </div>
        <svg id="chev-${key}" class="chevron${openCards[key]?' open':''}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="ex-body${openCards[key]?' open':''}" id="body-${key}"></div>
    </div>`;
  });
  document.getElementById('workout-content').innerHTML = html;
  setTimeout(()=>DAYS[day].exercises.forEach((_,ei)=>renderBody(day,ei)),0);
}

function renderBody(day,ei){
  const key = day+'-'+ei;
  const ex = DAYS[day].exercises[ei];
  const exSt = state[day][ei];
  const done = exSt.sets.filter(s=>s.done).length, total = exSt.sets.length;
  const pr = getPR(DAYS[day].name, ex.name);
  const curMax = Math.max(...exSt.sets.map(s=>s.weight));
  const isPR = pr>0 && curMax>pr;
  const prEl = document.getElementById('pr-'+key);
  if(prEl) prEl.style.display = isPR?'inline':'none';
  const cardEl = document.getElementById('card-'+key);
  if(cardEl) cardEl.classList.toggle('completed', done===total&&total>0);
  const pillEl = document.getElementById('pill-'+key);
  if(pillEl){pillEl.textContent=done+'/'+total+' Satze';pillEl.className='ex-pill'+(done===total?' done':'');}
  const bodyEl = document.getElementById('body-'+key);
  if(!bodyEl) return;
  let setsHTML = '';
  exSt.sets.forEach((s,si)=>{
    setsHTML += `<div class="set-row${s.done?' checked':''}" id="sr-${key}-${si}">
      <div class="set-check${s.done?' done':''}" id="chk-${key}-${si}" onclick="toggleSet('${day}',${ei},${si})">
        ${s.done?'<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="'+( document.documentElement.getAttribute('data-theme')==='dark'?'#000':'#fff')+'" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>':''}
      </div>
      <div class="set-num">S${si+1}</div>
      <div class="ig">
        <span class="ig-label">Wdh.</span>
        <input class="vi reps" id="${key}-${si}-reps" type="number" value="${s.reps}" min="0"
          onchange="setVal('${day}',${ei},${si},'reps',this.value)" oninput="setVal('${day}',${ei},${si},'reps',this.value)"/>
      </div>
      <div class="ig">
        <span class="ig-label">Gewicht${ex.unit?' (kg)':''}</span>
        <div class="stepper">
          <button class="sbtn big" onclick="change('${day}',${ei},${si},'weight',-5)">-5</button>
          <button class="sbtn" onclick="change('${day}',${ei},${si},'weight',-1)">-1</button>
          <input class="vi" id="${key}-${si}-weight" type="number" value="${s.weight}" min="0"
            onchange="setVal('${day}',${ei},${si},'weight',this.value)" oninput="setVal('${day}',${ei},${si},'weight',this.value)"/>
          <button class="sbtn" onclick="change('${day}',${ei},${si},'weight',1)">+1</button>
          <button class="sbtn big" onclick="change('${day}',${ei},${si},'weight',5)">+5</button>
        </div>
      </div>
    </div>`;
  });
  bodyEl.innerHTML = `
    <div class="chart-area">
      <div class="chart-label">Gewichtsentwicklung</div>
      <div class="chart-con" id="cc-${key}"><canvas id="chart-${key}"></canvas></div>
    </div>
    <div class="sets-area">${setsHTML}</div>
    <div class="set-mgmt">
      <button class="smb" onclick="addSet('${day}',${ei})">+ Satz hinzufuegen</button>
      <button class="smb del" onclick="removeSet('${day}',${ei})">- Satz entfernen</button>
    </div>
    <div class="notes-area">
      <textarea class="notes-input" placeholder="Notizen..." rows="2"
        onchange="setNote('${day}',${ei},this.value)" oninput="setNote('${day}',${ei},this.value)">${exSt.note||''}</textarea>
    </div>`;
  if(openCards[key]) setTimeout(()=>drawChart(day,ei),80);
}

function toggleCard(day,ei){
  const key = day+'-'+ei;
  openCards[key] = !openCards[key];
  document.getElementById('body-'+key).classList.toggle('open', !!openCards[key]);
  document.getElementById('chev-'+key).classList.toggle('open', !!openCards[key]);
  if(openCards[key]){ renderBody(day,ei); setTimeout(()=>drawChart(day,ei),80); }
}

// ── SET OPS ───────────────────────────────────────────────────────
function change(day,ei,si,field,delta){ let v=state[day][ei].sets[si][field]+delta; if(v<0)v=0; state[day][ei].sets[si][field]=v; const el=document.getElementById(day+'-'+ei+'-'+si+'-'+field); if(el)el.value=v; }
function setVal(day,ei,si,field,val){ let v=parseInt(val)||0; if(v<0)v=0; state[day][ei].sets[si][field]=v; }
function setNote(day,ei,val){ state[day][ei].note=val; }
function addSet(day,ei){ const last=state[day][ei].sets.slice(-1)[0]; state[day][ei].sets.push({weight:last?last.weight:20,reps:last?last.reps:10,done:false}); renderBody(day,ei); }
function removeSet(day,ei){ if(state[day][ei].sets.length<=1)return; state[day][ei].sets.pop(); renderBody(day,ei); }

function toggleSet(day,ei,si){
  const s = state[day][ei].sets[si];
  s.done = !s.done;
  const key = day+'-'+ei;
  const row = document.getElementById('sr-'+key+'-'+si);
  const chk = document.getElementById('chk-'+key+'-'+si);
  if(row) row.classList.toggle('checked', s.done);
  if(chk){ chk.classList.toggle('done',s.done); chk.innerHTML=s.done?'<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="'+(document.documentElement.getAttribute('data-theme')==='dark'?'#000':'#fff')+'" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>':''; }
  const pillEl=document.getElementById('pill-'+key);
  const sets=state[day][ei].sets;
  const done=sets.filter(x=>x.done).length, total=sets.length;
  if(pillEl){pillEl.textContent=done+'/'+total+' Satze';pillEl.className='ex-pill'+(done===total?' done':'');}
  document.getElementById('card-'+key)?.classList.toggle('completed',done===total&&total>0);
  const anyDone=state[day].some(ex=>ex.sets.some(s=>s.done));
  if(anyDone&&!wtRunning) toggleWT();
  const allDone=state[day].every(ex=>ex.sets.every(s=>s.done));
  if(allDone&&wtRunning) toggleWT();
  if(s.done){resetPause();togglePause();}
}

// ── CHARTS ────────────────────────────────────────────────────────
function cssVar(n){ return getComputedStyle(document.documentElement).getPropertyValue(n).trim(); }
function getHistory(dayName,exName){
  const saved=JSON.parse(localStorage.getItem('il_history')||'[]');
  return saved.filter(s=>s.day===dayName).reverse().slice(-10).map(s=>{
    const ex=s.exercises?.find(e=>e.name===exName); if(!ex)return null;
    return{label:s.date||'',weight:Math.max(...ex.sets.map(x=>x.weight||0))};
  }).filter(Boolean);
}
function drawChart(day,ei){
  const key=day+'-'+ei;
  const canvas=document.getElementById('chart-'+key);
  if(!canvas) return;
  if(charts[key]){charts[key].destroy();delete charts[key];}
  const hist=getHistory(DAYS[day].name,DAYS[day].exercises[ei].name);
  const con=document.getElementById('cc-'+key);
  if(hist.length<2){ if(con)con.innerHTML='<div class="chart-nodata">Nach 2 gespeicherten Einheiten erscheint dein Fortschritt</div>'; return; }
  const ac=cssVar('--accent');
  charts[key]=new Chart(canvas,{type:'line',data:{labels:hist.map(h=>h.label),datasets:[{data:hist.map(h=>h.weight),borderColor:ac,backgroundColor:ac+'18',borderWidth:2,pointRadius:4,pointBackgroundColor:ac,pointBorderColor:cssVar('--bg'),pointBorderWidth:2,tension:0.35,fill:true}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${c.parsed.y} kg`},backgroundColor:cssVar('--card2'),titleColor:ac,bodyColor:cssVar('--text'),borderColor:cssVar('--b2'),borderWidth:1,padding:8,cornerRadius:8}},scales:{x:{grid:{color:cssVar('--cg')},ticks:{color:cssVar('--ct'),font:{size:10,family:'Barlow'}}},y:{grid:{color:cssVar('--cg')},ticks:{color:cssVar('--ct'),font:{size:10,family:'Barlow'},callback:v=>v+'kg'}}}}});
}
function getPR(dayName,exName){
  const saved=JSON.parse(localStorage.getItem('il_history')||'[]');
  let max=0;
  saved.filter(s=>s.day===dayName).forEach(s=>{ const ex=s.exercises?.find(e=>e.name===exName); if(ex)ex.sets.forEach(s=>{if(s.weight>max)max=s.weight;}); });
  return max;
}
function drawOvChart(){
  if(ovChart){ovChart.destroy();ovChart=null;}
  const day=currentDay;
  const saved=JSON.parse(localStorage.getItem('il_history')||'[]');
  const sessions=saved.filter(s=>s.day===DAYS[day].name).reverse().slice(-10);
  const canvas=document.getElementById('ov-chart');
  if(!canvas) return;
  if(sessions.length<2){ const ctx=canvas.getContext('2d'); canvas.height=90; ctx.clearRect(0,0,canvas.width,canvas.height); ctx.fillStyle=cssVar('--t3'); ctx.font='12px Barlow,sans-serif'; ctx.textAlign='center'; ctx.fillText('Nach 2 Einheiten erscheint hier dein Fortschritt',canvas.offsetWidth/2,48); return; }
  const ac=cssVar('--accent');
  ovChart=new Chart(canvas,{type:'line',data:{labels:sessions.map(s=>s.date),datasets:[{data:sessions.map(s=>{ let v=0; s.exercises.forEach(ex=>ex.sets.forEach(st=>{v+=(st.weight||0)*(st.reps||0);})); return v; }),borderColor:ac,backgroundColor:ac+'15',borderWidth:2.5,pointRadius:5,pointBackgroundColor:ac,pointBorderColor:cssVar('--bg'),pointBorderWidth:2,tension:0.35,fill:true}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${c.parsed.y} kg Vol.`},backgroundColor:cssVar('--card2'),titleColor:ac,bodyColor:cssVar('--text'),borderColor:cssVar('--b2'),borderWidth:1,padding:8,cornerRadius:8}},scales:{x:{grid:{color:cssVar('--cg')},ticks:{color:cssVar('--ct'),font:{size:10,family:'Barlow'}}},y:{grid:{color:cssVar('--cg')},ticks:{color:cssVar('--ct'),font:{size:10,family:'Barlow'},callback:v=>v+'kg'}}}}});
}

// ── MUSCLE PAGE ───────────────────────────────────────────────────
function renderMusclePage(){
  const saved=JSON.parse(localStorage.getItem('il_history')||'[]');
  const weekStart=getWeekStart(new Date());
  const weekEnd=new Date(weekStart); weekEnd.setDate(weekStart.getDate()+6);
  const thisWeek=saved.filter(s=>{ const d=new Date(s.fullDate||'2000-01-01'); return d>=weekStart&&d<=weekEnd; });
  const counts={};
  ALL_MUSCLES.forEach(m=>counts[m]=0);
  thisWeek.forEach(s=>{
    const dayKey=Object.keys(DAYS).find(k=>DAYS[k].name===s.day);
    if(!dayKey) return;
    DAYS[dayKey].exercises.forEach(ex=>{ (ex.muscles||[]).forEach(m=>{counts[m]=(counts[m]||0)+1;}); });
  });
  const max=Math.max(...Object.values(counts),1);
  // body SVG
  const highlight=(m)=>{ const c=MUSCLE_COLORS[m]; return counts[m]>0?c:'#2a2a32'; };
  const bodyHTML=`
    <svg width="90" height="140" viewBox="0 0 90 140" fill="none" style="flex-shrink:0">
      <circle cx="45" cy="11" r="9" fill="#2a2a32"/>
      <rect x="40" y="19" width="10" height="7" rx="2" fill="#2a2a32"/>
      <path d="M27 27 Q45 22 63 27 L61 50 Q45 55 29 50 Z" fill="${highlight('Brust')}" opacity="0.9"/>
      <ellipse cx="22" cy="32" rx="8" ry="10" fill="${highlight('Schultern')}" opacity="0.85"/>
      <ellipse cx="68" cy="32" rx="8" ry="10" fill="${highlight('Schultern')}" opacity="0.85"/>
      <rect x="13" y="42" width="11" height="20" rx="5" fill="${highlight('Trizeps')}" opacity="0.8"/>
      <rect x="66" y="42" width="11" height="20" rx="5" fill="${highlight('Trizeps')}" opacity="0.8"/>
      <rect x="14" y="63" width="9" height="15" rx="4" fill="#2a2a32"/>
      <rect x="67" y="63" width="9" height="15" rx="4" fill="#2a2a32"/>
      <rect x="33" y="52" width="24" height="22" rx="4" fill="${highlight('Bauch')}" opacity="0.7"/>
      <rect x="30" y="75" width="13" height="36" rx="7" fill="${highlight('Beine')}" opacity="0.85"/>
      <rect x="47" y="75" width="13" height="36" rx="7" fill="${highlight('Beine')}" opacity="0.85"/>
      <rect x="31" y="113" width="11" height="22" rx="6" fill="${highlight('Waden')}" opacity="0.7"/>
      <rect x="48" y="113" width="11" height="22" rx="6" fill="${highlight('Waden')}" opacity="0.7"/>
    </svg>`;
  const legendHTML = Object.entries(MUSCLE_COLORS).map(([m,c])=>`<div class="leg-row"><div class="leg-dot" style="background:${c};${counts[m]===0?'opacity:0.2':''}"></div><span style="${counts[m]===0?'color:var(--t3)':''}">${m} — ${counts[m]}x</span></div>`).join('');
  document.getElementById('muscle-body-row').innerHTML = bodyHTML+`<div class="muscle-legend">${legendHTML}</div>`;
  const barsHTML = ALL_MUSCLES.map(m=>`<div class="mbar-row"><span class="mbar-label">${m}</span><div class="mbar-bg"><div class="mbar-fill" style="width:${Math.round(counts[m]/max*100)}%;background:${MUSCLE_COLORS[m]||'var(--accent)'}"></div></div><span class="mbar-num">${counts[m]}x</span></div>`).join('');
  document.getElementById('muscle-bars').innerHTML = barsHTML;
}

// ── MANAGE PAGE ───────────────────────────────────────────────────
let manageDay2='push';
function switchManageDay(day){
  manageDay2=day;
  document.querySelectorAll('.manage-tab').forEach((t,i)=>t.classList.toggle('active',['push','pull','beine'][i]===day));
  renderManage();
}
function renderManage(){
  const day=manageDay2;
  const exes=DAYS[day].exercises;
  let html='<div class="ex-edit-card" id="manage-card">';
  exes.forEach((ex,ei)=>{
    html+=`<div class="ex-edit-row" id="mer-${ei}" draggable="true"
      ondragstart="dragStart(${ei})" ondragover="dragOver(event,${ei})" ondrop="dragDrop(${ei})" ondragleave="dragLeave(${ei})">
      <div class="drag-handle"><div class="drag-line"></div><div class="drag-line"></div><div class="drag-line"></div></div>
      <input class="ex-edit-name" id="mename-${ei}" value="${ex.name}" readonly
        onchange="renameEx('${day}',${ei},this.value)"/>
      <div class="edit-actions">
        <div class="eabtn" onclick="startEdit(${ei})" id="edit-btn-${ei}" title="Umbenennen">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </div>
        <div class="eabtn del-ex" onclick="deleteEx('${day}',${ei})" title="Loschen">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
        </div>
      </div>
    </div>`;
  });
  html+=`<div class="add-ex-row" id="add-ex-row" onclick="toggleAddEx()">
    <div class="add-ex-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></div>
    <span class="add-ex-label" id="add-ex-label">Eigene Ubung hinzufuegen...</span>
    <input class="add-ex-input" id="add-ex-input" placeholder="Name der Ubung..." onkeydown="addExKey(event,'${day}')"/>
  </div></div>`;
  document.getElementById('manage-content').innerHTML=html;
}
let dragSrc=null;
function dragStart(i){dragSrc=i; setTimeout(()=>document.getElementById('mer-'+i)?.classList.add('dragging'),0);}
function dragOver(e,i){e.preventDefault(); if(i!==dragSrc) document.getElementById('mer-'+i)?.classList.add('drag-over');}
function dragLeave(i){document.getElementById('mer-'+i)?.classList.remove('drag-over');}
function dragDrop(i){
  document.getElementById('mer-'+i)?.classList.remove('drag-over');
  document.getElementById('mer-'+dragSrc)?.classList.remove('dragging');
  if(dragSrc===null||dragSrc===i) return;
  const day=manageDay2;
  const exes=DAYS[day].exercises;
  const moved=exes.splice(dragSrc,1)[0]; exes.splice(i,0,moved);
  // reset state for this day
  delete state[day];
  saveDays(); renderManage(); initState(day);
  showToast('Reihenfolge gespeichert');
}
function startEdit(ei){
  const inp=document.getElementById('mename-'+ei);
  const btn=document.getElementById('edit-btn-'+ei);
  if(!inp) return;
  inp.readOnly=false; inp.classList.add('editing'); inp.focus(); inp.select();
  if(btn) btn.innerHTML='<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>';
  btn.classList.add('save-edit');
  btn.onclick=()=>finishEdit(ei);
  inp.onkeydown=(e)=>{if(e.key==='Enter')finishEdit(ei);};
}
function finishEdit(ei){
  const inp=document.getElementById('mename-'+ei);
  const btn=document.getElementById('edit-btn-'+ei);
  if(!inp) return;
  const newName=inp.value.trim()||DAYS[manageDay2].exercises[ei].name;
  DAYS[manageDay2].exercises[ei].name=newName;
  inp.value=newName; inp.readOnly=true; inp.classList.remove('editing');
  if(btn){ btn.innerHTML='<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>'; btn.classList.remove('save-edit'); btn.onclick=()=>startEdit(ei); }
  delete state[manageDay2]; saveDays(); initState(manageDay2);
  showToast('Umbenennt!');
}
function deleteEx(day,ei){
  if(DAYS[day].exercises.length<=1){showToast('Mind. 1 Ubung behalten');return;}
  DAYS[day].exercises.splice(ei,1);
  delete state[day]; saveDays(); renderManage(); initState(day);
  showToast('Ubung entfernt');
}
function toggleAddEx(){
  const inp=document.getElementById('add-ex-input');
  const lbl=document.getElementById('add-ex-label');
  if(inp.style.display==='block'){inp.style.display='none';lbl.style.display='';return;}
  inp.style.display='block'; lbl.style.display='none'; inp.focus();
}
function addExKey(e,day){
  if(e.key==='Enter'){
    const val=document.getElementById('add-ex-input').value.trim();
    if(!val) return;
    DAYS[day].exercises.push({name:val,unit:'kg',muscles:[]});
    delete state[day]; saveDays(); renderManage(); initState(day);
    showToast('Ubung hinzugefuegt!');
  }
}
function renameEx(day,ei,val){ DAYS[day].exercises[ei].name=val; saveDays(); }

// ── TIMERS ────────────────────────────────────────────────────────
let pauseIv=null,pauseLeft=180,pauseRunning=false;
let wtIv=null,wtSecs=0,wtRunning=false;
function fmt(s){return Math.floor(s/60)+':'+(s%60<10?'0':'')+s%60;}
function togglePause(){
  if(pauseRunning){clearInterval(pauseIv);pauseRunning=false;document.getElementById('pause-btn').textContent='Start';document.getElementById('pause-btn').className='tc-btn go';}
  else{pauseRunning=true;document.getElementById('pause-btn').textContent='Stop';document.getElementById('pause-btn').className='tc-btn stop';
    pauseIv=setInterval(()=>{
      pauseLeft--;
      document.getElementById('pause-fill').style.width=(Math.max(0,pauseLeft)/180*100)+'%';
      const d=document.getElementById('pause-display');
      if(pauseLeft<=0){clearInterval(pauseIv);pauseRunning=false;d.textContent='Los!';d.className='tc-val done';document.getElementById('pause-btn').textContent='Start';document.getElementById('pause-btn').className='tc-btn go';if(navigator.vibrate)navigator.vibrate([300,100,300,100,300]);}
      else{d.textContent=fmt(pauseLeft);d.className='tc-val';}
    },1000);
  }
}
function resetPause(){clearInterval(pauseIv);pauseRunning=false;pauseLeft=180;document.getElementById('pause-display').textContent='3:00';document.getElementById('pause-display').className='tc-val';document.getElementById('pause-fill').style.width='100%';document.getElementById('pause-btn').textContent='Start';document.getElementById('pause-btn').className='tc-btn go';}
function toggleWT(){
  if(wtRunning){clearInterval(wtIv);wtRunning=false;document.getElementById('wt-btn').textContent='Weiter';document.getElementById('wt-btn').className='tc-btn go';}
  else{wtRunning=true;document.getElementById('wt-btn').textContent='Pause';document.getElementById('wt-btn').className='tc-btn stop';wtIv=setInterval(()=>{wtSecs++;document.getElementById('wt-display').textContent=fmt(wtSecs);},1000);}
}
function resetWT(){clearInterval(wtIv);wtRunning=false;wtSecs=0;document.getElementById('wt-display').textContent='00:00';document.getElementById('wt-btn').textContent='Start';document.getElementById('wt-btn').className='tc-btn go';}

// ── WEEK / STREAK ─────────────────────────────────────────────────
function getWeekStart(date){const d=new Date(date);const dow=d.getDay();d.setDate(d.getDate()-((dow+6)%7));d.setHours(0,0,0,0);return d;}
function dk(d){return d.toISOString().split('T')[0];}
function calcStreak(){
  const gymDays=JSON.parse(localStorage.getItem('il_gym')||'[]');
  if(!gymDays.length) return 0;
  let streak=0; let ws=getWeekStart(new Date());
  for(let w=0;w<52;w++){
    const we=new Date(ws);we.setDate(ws.getDate()+6);
    const cnt=gymDays.filter(d=>{const x=new Date(d);return x>=ws&&x<=we;}).length;
    if(cnt>=3) streak++;
    else if(w===0&&new Date().getDay()<=4) {ws=new Date(ws);ws.setDate(ws.getDate()-7);continue;}
    else break;
    ws=new Date(ws);ws.setDate(ws.getDate()-7);
  }
  return streak;
}
function renderWeek(){
  const days=['Mo','Di','Mi','Do','Fr','Sa','So'];
  const today=new Date(); const monday=getWeekStart(today);
  const gymDays=JSON.parse(localStorage.getItem('il_gym')||'[]');
  const restDays=JSON.parse(localStorage.getItem('il_rest')||'[]');
  const streak=calcStreak();
  document.getElementById('streak-num').textContent=streak;
  document.getElementById('streak-flames').innerHTML=streak>0?Array.from({length:Math.min(streak,5)},()=>'<span class="flame-icon">🔥</span>').join(''):'';
  let html='';
  for(let i=0;i<7;i++){
    const d=new Date(monday);d.setDate(monday.getDate()+i);
    const k=dk(d);const isToday=d.toDateString()===today.toDateString();
    const isGym=gymDays.includes(k);const isRest=restDays.includes(k);
    html+=`<div class="day-dot"><span class="day-name">${days[i]}</span><div class="day-circle${isGym?' gym':isRest?' rest':''}${isToday?' today':''}" onclick="toggleDay('${k}')">${isGym?'✓':isRest?'Z':d.getDate()}</div></div>`;
  }
  document.getElementById('week-days').innerHTML=html;
}
function toggleDay(key){
  let g=JSON.parse(localStorage.getItem('il_gym')||'[]');
  let r=JSON.parse(localStorage.getItem('il_rest')||'[]');
  if(!g.includes(key)&&!r.includes(key))g.push(key);
  else if(g.includes(key)){g=g.filter(x=>x!==key);r.push(key);}
  else r=r.filter(x=>x!==key);
  localStorage.setItem('il_gym',JSON.stringify(g));localStorage.setItem('il_rest',JSON.stringify(r));
  renderWeek();
}

// ── SAVE ──────────────────────────────────────────────────────────
function saveWorkout(){
  const day=currentDay;
  const saved=JSON.parse(localStorage.getItem('il_history')||'[]');
  const now=new Date(); const key=dk(now);
  let g=JSON.parse(localStorage.getItem('il_gym')||'[]');
  if(!g.includes(key))g.push(key); localStorage.setItem('il_gym',JSON.stringify(g));
  saved.unshift({day:DAYS[day].name,date:now.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric'}),fullDate:key,duration:fmt(wtSecs),exercises:DAYS[day].exercises.map((ex,ei)=>({name:ex.name,note:state[day][ei].note,sets:state[day][ei].sets.map(s=>({weight:s.weight,reps:s.reps}))}))});
  if(saved.length>40)saved.splice(40);
  localStorage.setItem('il_history',JSON.stringify(saved));
  renderHistory();renderWeek();drawOvChart();showToast('Workout gespeichert!');
}

// ── HISTORY ───────────────────────────────────────────────────────
function renderHistory(){
  const saved=JSON.parse(localStorage.getItem('il_history')||'[]');
  const el=document.getElementById('history-list');
  if(!el) return;
  if(!saved.length){el.innerHTML='<p style="font-size:13px;color:var(--t3);padding:6px 0">Noch keine Einheiten gespeichert.</p>';return;}
  el.innerHTML=saved.slice(0,10).map((e,i)=>{
    const rows=e.exercises.map(ex=>{const s=ex.sets.map((s,si)=>`S${si+1}: ${s.weight>0?s.weight+'kg x':''}${s.reps}`).join(' · ');return`<div class="hist-row"><span style="font-weight:600">${ex.name}</span><span>${s}</span></div>`;}).join('');
    return`<div class="hist-card"><div class="hist-head"><div><span class="hist-day">${e.day}</span> <span class="hist-date">${e.date}${e.duration?' · '+e.duration:''}</span></div><button class="hist-del" onclick="openModal(${i})"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>${rows}</div>`;
  }).join('');
}
function openModal(i){deleteIndex=i;document.getElementById('modal-bg').classList.add('open');}
function closeModal(){deleteIndex=null;document.getElementById('modal-bg').classList.remove('open');}
function confirmDelete(){if(deleteIndex===null)return;const saved=JSON.parse(localStorage.getItem('il_history')||'[]');saved.splice(deleteIndex,1);localStorage.setItem('il_history',JSON.stringify(saved));closeModal();renderHistory();showToast('Einheit geloscht');}

// ── CSV ───────────────────────────────────────────────────────────
function exportCSV(){
  const saved=JSON.parse(localStorage.getItem('il_history')||'[]');
  if(!saved.length){showToast('Keine Daten');return;}
  let csv='Datum,Tag,Dauer,Ubung,Satz,Gewicht,Wdh,Notiz\n';
  saved.forEach(e=>e.exercises.forEach(ex=>ex.sets.forEach((s,si)=>{csv+=`"${e.date}","${e.day}","${e.duration||''}","${ex.name}",${si+1},${s.weight},${s.reps},"${(ex.note||'').replace(/"/g,'""')}"\n`;})));
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'}));a.download='ironlog.csv';a.click();
  showToast('CSV exportiert!');
}

// ── TOAST ─────────────────────────────────────────────────────────
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2400);}

// ── INIT ──────────────────────────────────────────────────────────
const savedTheme=localStorage.getItem('il_theme')||'dark';
document.documentElement.setAttribute('data-theme',savedTheme);
updateThemeIcon();
initState('push');render();renderWeek();
setTimeout(drawOvChart,200);
</script>
