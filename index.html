<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <meta name="apple-mobile-web-app-title" content="GymTracker" />
  <title>GymTracker</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    /* ── TOKENS ── */
    :root {
      --bg:        #0a0a0a;
      --bg2:       #111111;
      --bg3:       #1a1a1a;
      --border:    #2a2a2a;
      --accent:    #e8ff47;
      --accent2:   #ff6b35;
      --text:      #f0f0f0;
      --text2:     #888888;
      --text3:     #555555;
      --green:     #4cff91;
      --red:       #ff4c4c;
      --radius:    6px;
      --safe-top:  env(safe-area-inset-top, 0px);
      --safe-bot:  env(safe-area-inset-bottom, 0px);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      font-size: 16px;
      min-height: 100dvh;
      overscroll-behavior: none;
      -webkit-tap-highlight-color: transparent;
    }

    button { cursor: pointer; border: none; background: none; font-family: inherit; }
    input  { font-family: inherit; }

    /* ── LAYOUT ── */
    #app {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100dvh;
      position: relative;
      padding-bottom: calc(80px + var(--safe-bot));
    }

    .screen {
      padding: 0 0 20px;
    }

    /* ── HOME ── */
    .home-screen { }

    .app-header {
      background: var(--bg);
      padding: calc(var(--safe-top) + 20px) 20px 24px;
      border-bottom: 1px solid var(--border);
    }

    .logo-mark {
      display: inline-block;
      background: var(--accent);
      color: #000;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800;
      font-size: 13px;
      letter-spacing: 0.08em;
      padding: 3px 6px;
      border-radius: 3px;
      margin-bottom: 8px;
    }

    .app-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 38px;
      font-weight: 800;
      letter-spacing: -0.01em;
      line-height: 1;
      color: var(--text);
    }

    .header-sub {
      color: var(--text2);
      font-size: 14px;
      margin-top: 4px;
      font-weight: 500;
    }

    .days-grid {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .day-card {
      display: flex;
      align-items: center;
      gap: 16px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 16px;
      text-align: left;
      transition: border-color 0.15s, background 0.15s;
      width: 100%;
    }
    .day-card:active { background: var(--bg3); border-color: var(--accent); }

    .day-emoji { font-size: 28px; flex-shrink: 0; }

    .day-info { flex: 1; }
    .day-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text3);
      font-weight: 600;
    }
    .day-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.1;
      margin-top: 2px;
    }
    .day-count { font-size: 13px; color: var(--text2); margin-top: 3px; }

    .day-arrow {
      font-size: 20px;
      color: var(--text3);
    }

    .timer-config-card {
      margin: 4px 16px 16px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
    }
    .tc-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text2);
      font-weight: 600;
      margin-bottom: 10px;
    }
    .tc-buttons { display: flex; gap: 8px; }
    .tc-btn {
      flex: 1;
      padding: 10px 0;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--bg3);
      color: var(--text2);
      font-weight: 600;
      font-size: 15px;
      transition: all 0.15s;
    }
    .tc-btn.active {
      background: var(--accent);
      color: #000;
      border-color: var(--accent);
    }

    /* ── PAGE HEADER ── */
    .page-header {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: calc(var(--safe-top) + 14px) 16px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .back-btn {
      color: var(--accent);
      font-size: 15px;
      font-weight: 600;
      padding: 6px 0;
      white-space: nowrap;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .page-emoji { font-size: 20px; }

    .page-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 24px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.1;
      flex: 1;
    }

    .ex-target {
      font-size: 13px;
      color: var(--text2);
      margin-top: 2px;
    }

    .history-btn {
      font-size: 22px;
      padding: 4px;
      flex-shrink: 0;
    }

    /* ── EXERCISE LIST ── */
    .exercise-list {
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .exercise-row {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      text-align: left;
      width: 100%;
      transition: border-color 0.12s, background 0.12s;
    }
    .exercise-row:active { background: var(--bg3); border-color: var(--accent); }

    .ex-left { flex: 1; }
    .ex-name {
      font-size: 17px;
      font-weight: 600;
      color: var(--text);
    }
    .ex-meta {
      font-size: 13px;
      color: var(--text2);
      margin-top: 2px;
    }

    .ex-right { text-align: right; }
    .last-weight {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 28px;
      font-weight: 700;
      color: var(--accent);
      line-height: 1;
    }
    .unit { font-size: 14px; font-weight: 600; margin-left: 2px; }
    .last-label { font-size: 11px; color: var(--text3); margin-top: 2px; }
    .no-data {
      font-size: 12px;
      background: var(--bg3);
      border: 1px dashed var(--border);
      border-radius: 4px;
      padding: 4px 10px;
      color: var(--text3);
    }

    /* ── EXERCISE SCREEN ── */
    .last-session-banner {
      margin: 12px 16px 4px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      border-radius: var(--radius);
      padding: 10px 12px;
      font-size: 13px;
    }
    .ls-label { color: var(--text2); display: block; margin-bottom: 4px; }
    .ls-weights {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 18px;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 0.03em;
    }

    .sets-container {
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .set-row {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 12px 10px;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
    }

    .set-row.set-completed {
      border-color: var(--green);
      background: rgba(76,255,145,0.04);
    }

    .set-number {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 28px;
      font-weight: 800;
      color: var(--text3);
      width: 28px;
      text-align: center;
      flex-shrink: 0;
    }

    .set-row.set-completed .set-number { color: var(--green); }

    .set-inputs {
      display: flex;
      gap: 10px;
      flex: 1;
      flex-wrap: wrap;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex: 1;
      min-width: 90px;
    }
    .input-group label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text3);
      font-weight: 600;
    }

    .weight-control {
      display: flex;
      align-items: center;
      gap: 0;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .adj-btn {
      width: 38px;
      height: 44px;
      font-size: 20px;
      font-weight: 600;
      color: var(--text2);
      background: var(--bg3);
      transition: background 0.1s, color 0.1s;
      flex-shrink: 0;
    }
    .adj-btn:active { background: var(--accent); color: #000; }

    .weight-input,
    .reps-input {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text);
      font-size: 20px;
      font-weight: 700;
      text-align: center;
      height: 44px;
      outline: none;
      min-width: 0;
      -moz-appearance: textfield;
    }
    .weight-input::-webkit-outer-spin-button,
    .weight-input::-webkit-inner-spin-button,
    .reps-input::-webkit-outer-spin-button,
    .reps-input::-webkit-inner-spin-button { -webkit-appearance: none; }

    .input-unit {
      font-size: 11px;
      color: var(--text3);
      text-align: center;
      margin-top: 2px;
    }

    .set-prev {
      position: absolute;
      bottom: 6px;
      right: 52px;
      font-size: 11px;
      color: var(--text3);
    }

    .set-done-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 2px solid var(--border);
      color: var(--text3);
      font-size: 16px;
      flex-shrink: 0;
      transition: all 0.15s;
    }
    .set-done-btn.done-active {
      background: var(--green);
      border-color: var(--green);
      color: #000;
    }

    .set-actions {
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex-shrink: 0;
    }

    .set-delete-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 2px solid var(--border);
      color: var(--text3);
      font-size: 13px;
      font-weight: 700;
      flex-shrink: 0;
      transition: all 0.15s;
    }
    .set-delete-btn:active {
      background: var(--red);
      border-color: var(--red);
      color: #fff;
    }

    .add-set-btn {
      margin: 4px 16px 8px;
      width: calc(100% - 32px);
      padding: 12px;
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text2);
      font-size: 15px;
      font-weight: 600;
      text-align: center;
      transition: border-color 0.12s, color 0.12s;
    }
    .add-set-btn:active { border-color: var(--accent); color: var(--accent); }

    /* ── ACTION BAR ── */
    .action-bar {
      position: sticky;
      bottom: calc(60px + var(--safe-bot));
      left: 0; right: 0;
      display: flex;
      gap: 10px;
      padding: 10px 16px;
      background: linear-gradient(to top, var(--bg) 70%, transparent);
      z-index: 20;
    }

    .timer-trigger-btn {
      flex: 1;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 16px;
      font-weight: 600;
      padding: 14px 12px;
      transition: border-color 0.12s;
    }
    .timer-trigger-btn:active { border-color: var(--accent2); }

    .save-btn {
      flex: 1;
      background: var(--accent);
      border-radius: var(--radius);
      color: #000;
      font-size: 16px;
      font-weight: 700;
      padding: 14px 12px;
      transition: opacity 0.12s;
    }
    .save-btn:active { opacity: 0.8; }
    .save-btn.saved { background: var(--green); }

    /* ── TIMER BAR ── */
    #timer-bar {
      position: fixed;
      bottom: var(--safe-bot);
      left: 50%;
      transform: translateX(-50%);
      width: min(480px, 100%);
      height: 52px;
      background: #1a1a1a;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 12px;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    #timer-bar.visible {
      opacity: 1;
      pointer-events: all;
    }

    #timer-fill {
      position: absolute;
      left: 0; top: 0;
      height: 100%;
      background: rgba(232,255,71,0.12);
      transition: width 0.25s linear;
    }

    #timer-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--accent);
      flex: 1;
      position: relative;
      z-index: 1;
    }

    #timer-stop {
      position: relative;
      z-index: 1;
      color: var(--text3);
      font-size: 18px;
      padding: 8px;
    }

    #timer-bar.timer-done {
      background: rgba(76,255,145,0.08);
      border-color: var(--green);
    }
    #timer-bar.timer-done #timer-label { color: var(--green); }

    /* ── HISTORY ── */
    .history-list {
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .history-entry {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
    }

    .he-date {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text2);
      font-weight: 600;
      margin-bottom: 10px;
    }

    .he-sets {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 8px;
    }

    .he-set {
      display: flex;
      align-items: center;
      gap: 4px;
      background: var(--bg3);
      border-radius: 4px;
      padding: 6px 10px;
    }

    .he-num {
      font-size: 11px;
      color: var(--text3);
      font-weight: 700;
      margin-right: 2px;
    }

    .he-weight {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 18px;
      font-weight: 700;
      color: var(--accent);
    }

    .he-reps { font-size: 13px; color: var(--text2); }

    .he-volume {
      font-size: 12px;
      color: var(--text3);
      font-weight: 500;
    }

    /* ── EMPTY STATE ── */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text2);
      font-size: 16px;
      line-height: 1.6;
    }
    .empty-icon { font-size: 48px; margin-bottom: 16px; }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>
  <div id="app">
    <div style="display:flex;align-items:center;justify-content:center;height:100dvh;flex-direction:column;gap:16px;">
      <div style="font-family:'Barlow Condensed',sans-serif;font-size:48px;font-weight:800;color:#e8ff47;">GT</div>
      <div style="color:#555;font-size:14px;">Lade Daten…</div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
