<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const CLIENT_ID = "590402496982-vurj26vm01c40c8oaqrklb2u5dtkpald.apps.googleusercontent.com";
const SCOPES    = "https://www.googleapis.com/auth/drive.appdata";
const FILE_NAME = "fittrack_data.json";

// ── TRAINING PLAN ─────────────────────────────────────────────────────────────

      { id: "legcurl2",   name: "Beinbeuger (Maschine)",            sets: 3, reps: "10–12", rest: 90, unit: "kg" },
      { id: "calf2",      name: "Wadenheben",                       sets: 3, reps: "12–15", rest: 60, unit: "kg" },
    ],

];

// ── LOCAL STORAGE ─────────────────────────────────────────────────────────────
const LS_KEY = "fitness_v3";
function lsLoad() {
  try { const r = localStorage.getItem(LS_KEY); return r ? JSON.parse(r) : { logs: {} }; }
  catch { return { logs: {} }; }
}
function lsSave(d) { try { localStorage.setItem(LS_KEY, JSON.stringify(d)); } catch {} }

// ── FIX 1: Local timezone date key (not UTC) ──────────────────────────────────
function todayKey() {
  const d = new Date();
  const yyyy = d.getFullYear();
  const mm   = String(d.getMonth() + 1).padStart(2, "0");
  const dd   = String(d.getDate()).padStart(2, "0");
  return `${yyyy}-${mm}-${dd}`;
}

// ── GOOGLE DRIVE ──────────────────────────────────────────────────────────────
let _token      = null;
let _tokenExp   = 0;       // FIX 3: track expiry
let _cachedFileId = null;  // FIX 4: cache file ID to avoid double lookup

function tokenValid() { return _token && Date.now() < _tokenExp - 60_000; }

// FIX 2: wait for GSI script to load before calling
function waitForGoogle(timeout = 10000) {
  return new Promise((resolve, reject) => {
    if (window.google?.accounts?.oauth2) return resolve();
    const start = Date.now();
    const check = setInterval(() => {
      if (window.google?.accounts?.oauth2) { clearInterval(check); resolve(); }
      else if (Date.now() - start > timeout) { clearInterval(check); reject(new Error("Google-Bibliothek nicht geladen")); }
    }, 100);
  });
}

async function signIn() {
  await waitForGoogle();  // FIX 2
  return new Promise((resolve, reject) => {
    const client = google.accounts.oauth2.initTokenClient({
      client_id: CLIENT_ID,
      scope: SCOPES,
      callback: (resp) => {
        if (resp.error) return reject(new Error(resp.error));
        _token    = resp.access_token;
        _tokenExp = Date.now() + (resp.expires_in ?? 3600) * 1000;  // FIX 3
        _cachedFileId = null; // reset cache on new token
        resolve();
      },
    });
    client.requestAccessToken();
  });
}

// FIX 3: re-authenticate if token expired
async function ensureToken() {
  if (!tokenValid()) await signIn();
}

async function driveGet(url) {
  await ensureToken();
  const res = await fetch(url, { headers: { Authorization: `Bearer ${_token}` } });
  if (!res.ok) throw new Error(`Drive ${res.status}`);
  return res.status === 204 ? null : res.json();
}

// FIX 4: cache file ID so we only look it up once
async function getFileId() {
  if (_cachedFileId) return _cachedFileId;
  const data = await driveGet(
    `https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&q=name='${FILE_NAME}'&fields=files(id)`
  );
  _cachedFileId = data.files?.[0]?.id ?? null;
  return _cachedFileId;
}

async function loadFromDrive() {
  await ensureToken();
  const id = await getFileId();
  if (!id) return null;
  const res = await fetch(`https://www.googleapis.com/drive/v3/files/${id}?alt=media`,
    { headers: { Authorization: `Bearer ${_token}` } });
  if (!res.ok) return null;
  return res.json();
}

async function saveToDrive(payload) {
  await ensureToken();
  const json = JSON.stringify(payload);
  const id   = await getFileId(); // FIX 4: only 1 lookup per save

  if (id) {
    const res = await fetch(
      `https://www.googleapis.com/upload/drive/v3/files/${id}?uploadType=media`,
      { method: "PATCH", headers: { Authorization: `Bearer ${_token}`, "Content-Type": "application/json" }, body: json }
    );
    if (!res.ok) throw new Error(`Save failed ${res.status}`);
  } else {
    const meta = JSON.stringify({ name: FILE_NAME, parents: ["appDataFolder"] });
    const form = new FormData();
    form.append("metadata", new Blob([meta], { type: "application/json" }));
    form.append("file",     new Blob([json], { type: "application/json" }));
    const res = await fetch(
      "https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id",
      { method: "POST", headers: { Authorization: `Bearer ${_token}` }, body: form }
    );
    if (!res.ok) throw new Error(`Create failed ${res.status}`);
    const created = await res.json();
    _cachedFileId = created.id; // cache new ID
  }
}

// ── TIMER HOOK ────────────────────────────────────────────────────────────────
function useTimer(onFinish) {
  const [seconds, setSeconds] = useState(0);
  const [running, setRunning] = useState(false);
  const endRef = useRef(null);
  const cbRef  = useRef(onFinish);
  cbRef.current = onFinish;
  useEffect(() => {
    if (!running) return;
    const iv = setInterval(() => {
      const rem = Math.max(0, Math.round((endRef.current - Date.now()) / 1000));
      setSeconds(rem);
      if (rem === 0) { setRunning(false); clearInterval(iv); cbRef.current?.(); }
    }, 250);
    return () => clearInterval(iv);
  }, [running]);
  const start = useCallback((dur) => { endRef.current = Date.now() + dur * 1000; setSeconds(dur); setRunning(true); }, []);
  const stop  = useCallback(() => setRunning(false), []);
  const reset = useCallback(() => { setRunning(false); setSeconds(0); }, []);
  return { seconds, running, start, stop, reset };
}

function fmtTime(s) {
  const m = Math.floor(s / 60), sec = s % 60;
  return m > 0 ? `${m}:${sec.toString().padStart(2, "0")}` : `${sec}s`;
}

function reqNotif() {
  if ("Notification" in window && Notification.permission === "default") Notification.requestPermission();
}
function sendNotif(title, body) {
  if ("Notification" in window && Notification.permission === "granted") new Notification(title, { body });
}

// ══════════════════════════════════════════════════════════════════════════════
// MAIN APP
// ══════════════════════════════════════════════════════════════════════════════
function App() {
  const [data,       setData]       = useState(() => lsLoad());
  const [view,       setView]       = useState("home");
  const [activeDay,  setActiveDay]  = useState(null);
  const [toast,      setToast]      = useState(null);
  const [syncStatus, setSyncStatus] = useState("offline");
  const [isLoggedIn, setIsLoggedIn] = useState(false);
  const saveTimer = useRef(null);
  const skipNextSave = useRef(false); // prevent saving right after loading from Drive

  const timer = useTimer(() => {
    sendNotif("Pause beendet!", "Nächster Satz – Los geht's!");
    showToast("Pause beendet! Weiter geht's!");
  });

  useEffect(() => { reqNotif(); }, []);

  // Always save locally; debounce Drive save
  useEffect(() => {
    lsSave(data);
    if (!isLoggedIn) return;
    if (skipNextSave.current) { skipNextSave.current = false; return; }
    clearTimeout(saveTimer.current);
    setSyncStatus("syncing");
    saveTimer.current = setTimeout(async () => {
      try   { await saveToDrive(data); setSyncStatus("synced"); }
      catch { setSyncStatus("error"); }
    }, 1500);
  }, [data]); // deliberately exclude isLoggedIn to avoid double-save on login

  function showToast(msg) { setToast(msg); setTimeout(() => setToast(null), 2800); }

  async function handleLogin() {
    try {
      setSyncStatus("syncing");
      await signIn();
      setIsLoggedIn(true);
      showToast("Verbunden – lade Daten...");
      const remote = await loadFromDrive();
      if (remote?.logs) {
        const merged = { logs: { ...remote.logs } };
        const today  = todayKey();
        // Keep today's local data, use remote for everything else
        Object.entries(data.logs).forEach(([k, v]) => {
          if (k.startsWith(today)) merged.logs[k] = v;
        });
        skipNextSave.current = true; // don't immediately re-upload what we just downloaded
        setData(merged);
        lsSave(merged);
        showToast("Daten aus Google Drive geladen!");
      } else {
        showToast("Kein Drive-Verlauf – lokale Daten bleiben.");
        // Upload local data as first sync
        await saveToDrive(data);
      }
      setSyncStatus("synced");
    } catch (e) {
      setSyncStatus("error");
      showToast("Anmeldung fehlgeschlagen: " + (e.message || ""));
    }
  }

  // ── Data helpers ───────────────────────────────────────────────────────────
  function getLog(dayId, exId) {
    return data.logs[`${todayKey()}_${dayId}`]?.[exId] ?? {};
  }

  function mutateLog(updater) {
    setData(prev => {
      const logs = JSON.parse(JSON.stringify(prev.logs));
      updater(logs);
      return { ...prev, logs };
    });
  }

  function setSetValue(dayId, exId, si, field, value) {
    const key = `${todayKey()}_${dayId}`;
    mutateLog(logs => {
      if (!logs[key])          logs[key]          = {};
      if (!logs[key][exId])    logs[key][exId]    = {};
      if (!logs[key][exId][si])logs[key][exId][si]= {};
      logs[key][exId][si][field] = value;
    });
  }

  function markSetDone(dayId, exId, si, rest) {
    setSetValue(dayId, exId, si, "done", true);
    timer.start(rest);
    showToast(`Pause: ${fmtTime(rest)}`);
  }

  function histSetValue(sk, exId, si, field, value) {
    mutateLog(logs => {
      if (!logs[sk])          logs[sk]          = {};
      if (!logs[sk][exId])    logs[sk][exId]    = {};
      if (!logs[sk][exId][si])logs[sk][exId][si]= {};
      logs[sk][exId][si][field] = value;
    });
  }

  function histDeleteSet(sk, exId, si) {
    mutateLog(logs => {
      if (logs[sk]?.[exId]?.[si] === undefined) return;
      delete logs[sk][exId][si];
      if (!Object.keys(logs[sk][exId]).length) delete logs[sk][exId];
      if (!Object.keys(logs[sk]).length)       delete logs[sk];
    });
  }

  // FIX 5: use `!= null` instead of `filter(Boolean)` so 0 kg is valid
  function getLastWeight(dayId, exId) {
    const keys = Object.keys(data.logs)
      .filter(k => k.endsWith(`_${dayId}`) && !k.startsWith(todayKey()))
      .sort().reverse();
    for (const k of keys) {
      const weights = Object.values(data.logs[k]?.[exId] ?? {})
        .map(s => parseFloat(s.weight))
        .filter(w => !isNaN(w)); // FIX 5: keep 0, only drop NaN
      if (weights.length) return Math.max(...weights);
    }
    return null;
  }

  function dayProgress(day) {
    const log = data.logs[`${todayKey()}_${day.id}`] ?? {};
    let done = 0, total = 0;
    for (const ex of day.exercises)
      for (let i = 0; i < ex.sets; i++) { total++; if (log[ex.id]?.[i]?.done) done++; }
    return { done, total };
  }

  if (view === "workout" && activeDay) return (
    <WorkoutView day={activeDay} getLog={getLog} setSetValue={setSetValue}
      markSetDone={markSetDone} getLastWeight={getLastWeight} timer={timer}
      onBack={() => { setView("home"); timer.reset(); }} toast={toast} />
  );
  if (view === "history") return (
    <HistoryView data={data} onBack={() => setView("home")}
      histSetValue={histSetValue} histDeleteSet={histDeleteSet} />
  );
  return (
    <HomeView plan={PLAN} dayProgress={dayProgress}
      onStart={day => { setActiveDay(day); setView("workout"); }}
      onHistory={() => setView("history")}
      toast={toast} syncStatus={syncStatus} isLoggedIn={isLoggedIn} onLogin={handleLogin} />
  );
}

// ── SYNC BADGE ────────────────────────────────────────────────────────────────
function SyncBadge({ status, isLoggedIn, onLogin }) {
  if (!isLoggedIn) return (
    <button style={S.loginBtn} onClick={onLogin}>Drive-Sync</button>
  );
  const map = {
    syncing: { color: "#F59E0B", label: "Speichern…" },
    synced:  { color: "#22c55e", label: "Gespeichert" },
    error:   { color: "#ef4444", label: "Fehler" },
    offline: { color: "#555",    label: "Offline" },
  };
  const s = map[status] || map.offline;
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 5, fontSize: 11, color: s.color, fontWeight: 700 }}>
      {status === "syncing"
        ? <div style={{ width: 8, height: 8, border: `2px solid ${s.color}`, borderTopColor: "transparent", borderRadius: "50%", animation: "spin 0.8s linear infinite" }} />
        : <div style={{ width: 8, height: 8, borderRadius: "50%", background: s.color }} />
      }
      {s.label}
    </div>
  );
}

// ── HOME ──────────────────────────────────────────────────────────────────────
function HomeView({ plan, dayProgress, onStart, onHistory, toast, syncStatus, isLoggedIn, onLogin }) {
  return (
    <div style={S.app}>
      {toast && <Toast msg={toast} />}
      <header style={S.header}>
        <div style={S.logo}>FitTrack</div>
        <SyncBadge status={syncStatus} isLoggedIn={isLoggedIn} onLogin={onLogin} />
        <button style={S.histBtn} onClick={onHistory}>Verlauf</button>
      </header>
      <div style={{ padding: "28px 20px 8px" }}>
        <h1 style={S.h1}>Dein Trainingsplan</h1>
        <p style={{ color: "#666", margin: "4px 0 0", fontSize: 14 }}>Wähle deinen heutigen Tag</p>
      </div>
      <div style={S.dayGrid}>
        {plan.map(day => {
          const { done, total } = dayProgress(day);
          const pct = total ? Math.round((done / total) * 100) : 0;
          return (
            <button key={day.id} className="day-card"
              style={{ ...S.dayCard, borderColor: pct > 0 ? day.color + "55" : "#1E1E2E" }}
              onClick={() => onStart(day)}>
              <div style={{ position: "absolute", top: 0, left: 0, right: 0, height: 3, background: day.color, borderRadius: "18px 18px 0 0" }} />
              <div style={{ fontSize: 11, color: "#555", fontWeight: 700, letterSpacing: 1, textTransform: "uppercase", marginTop: 8 }}>{day.label}</div>
              <div style={{ fontSize: 15, fontWeight: 800, color: "#E8E8F0", lineHeight: 1.2, marginTop: 2 }}>{day.title}</div>
              <div style={{ fontSize: 12, color: "#555", marginTop: 4 }}>{day.exercises.length} Übungen</div>
              {pct > 0 && <>
                <div style={{ height: 3, background: "#1E1E2E", borderRadius: 2, marginTop: 10 }}>
                  <div style={{ height: "100%", borderRadius: 2, background: day.color, width: `${pct}%` }} />
                </div>
                <div style={{ fontSize: 11, fontWeight: 700, marginTop: 4, color: day.color }}>{pct}% heute</div>
              </>}
            </button>
          );
        })}
      </div>
    </div>
  );
}

// ── WORKOUT ───────────────────────────────────────────────────────────────────
function WorkoutView({ day, getLog, setSetValue, markSetDone, getLastWeight, timer, onBack, toast }) {
  return (
    <div style={S.app}>
      {toast && <Toast msg={toast} />}
      <header style={{ ...S.header, borderBottom: `2px solid ${day.color}` }}>
        <button style={S.backBtn} onClick={onBack}>← Zurück</button>
        <div style={{ ...S.logo, color: day.color }}>{day.title}</div>
        <div />
      </header>
      {timer.running && (
        <div style={{ position: "sticky", top: 57, zIndex: 99, background: "#0F0820", borderBottom: "2px solid #A78BFA", display: "flex", alignItems: "center", justifyContent: "center", gap: 12, padding: "10px 20px" }}>
          <span style={{ fontSize: 12, color: "#A78BFA", textTransform: "uppercase", letterSpacing: 1 }}>Pause</span>
          <span style={{ fontSize: 28, fontWeight: 900, color: "#A78BFA", fontVariantNumeric: "tabular-nums", minWidth: 70, textAlign: "center" }}>{fmtTime(timer.seconds)}</span>
          <button style={{ background: "transparent", border: "1px solid #A78BFA", color: "#A78BFA", borderRadius: 8, padding: "4px 12px", cursor: "pointer", fontSize: 12 }} onClick={timer.stop}>Überspringen</button>
        </div>
      )}
      <div style={S.scroll}>
        {day.exercises.map((ex, ei) => {
          const log   = getLog(day.id, ex.id);
          const lastW = getLastWeight(day.id, ex.id);
          const allDone = Array.from({ length: ex.sets }, (_, i) => log[i]?.done).every(Boolean);
          return (
            <div key={ex.id} style={{ ...S.card, opacity: allDone ? 0.65 : 1 }}>
              <div style={{ display: "flex", alignItems: "flex-start", gap: 12, marginBottom: 14 }}>
                <span style={{ width: 26, height: 26, borderRadius: "50%", background: day.color, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 12, fontWeight: 900, color: "#000", flexShrink: 0, marginTop: 2 }}>{ei + 1}</span>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 15, fontWeight: 800, lineHeight: 1.2 }}>{ex.name}</div>
                  <div style={{ fontSize: 12, color: "#555", marginTop: 2 }}>{ex.sets} Sätze · {ex.reps} Wdh. · Pause: {fmtTime(ex.rest)}</div>
                  {lastW !== null && <div style={{ fontSize: 11, color: "#888", marginTop: 2 }}>Letztes Mal: {lastW} {ex.unit}</div>}
                </div>
                {allDone && <span style={{ fontSize: 22, color: "#22c55e" }}>✓</span>}
              </div>
              <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                <div style={{ display: "grid", gridTemplateColumns: "30px 1fr 1fr 44px", gap: 8, fontSize: 10, color: "#444", textTransform: "uppercase", letterSpacing: 0.5, padding: "0 4px" }}>
                  <span>Satz</span><span>Gewicht ({ex.unit})</span><span>Wdh.</span><span></span>
                </div>
                {Array.from({ length: ex.sets }, (_, si) => {
                  const setLog = log[si] ?? {};
                  const done   = setLog.done ?? false;
                  return (
                    <div key={si} style={{ display: "grid", gridTemplateColumns: "30px 1fr 1fr 44px", gap: 8, alignItems: "center", padding: 4, borderRadius: 8, background: done ? "rgba(255,255,255,0.04)" : "transparent" }}>
                      <span style={{ fontSize: 16, fontWeight: 900, textAlign: "center", color: day.color }}>{si + 1}</span>
                      <input type="number" style={S.input} placeholder="–" value={setLog.weight ?? ""}
                        onChange={e => setSetValue(day.id, ex.id, si, "weight", e.target.value)} />
                      <input type="number" style={S.input} placeholder="–" value={setLog.reps ?? ""}
                        onChange={e => setSetValue(day.id, ex.id, si, "reps", e.target.value)} />
                      <button style={{ ...S.doneBtn, background: done ? "#22c55e" : day.color }}
                        onClick={() => !done && markSetDone(day.id, ex.id, si, ex.rest)}>✓</button>
                    </div>
                  );
                })}
              </div>
            </div>
          );
        })}
        <div style={{ height: 80 }} />
      </div>
    </div>
  );
}

// ── HISTORY ───────────────────────────────────────────────────────────────────
function HistoryView({ data, onBack, histSetValue, histDeleteSet }) {
  const dayMap  = Object.fromEntries(PLAN.map(d => [d.id, d]));
  const [editing, setEditing] = useState({});

  const sessions = Object.entries(data.logs)
    .map(([key, log]) => {
      const [date, dayId] = key.split("_");
      const day = dayMap[dayId];
      if (!day) return null;
      let done = 0, total = 0;
      for (const ex of day.exercises)
        for (let i = 0; i < ex.sets; i++) { total++; if (log[ex.id]?.[i]?.done) done++; }
      return { key, date, day, log, done, total };
    })
    .filter(Boolean)
    .sort((a, b) => b.date.localeCompare(a.date));

  const toggleEdit = (sk, exId) => {
    const k = `${sk}__${exId}`;
    setEditing(prev => ({ ...prev, [k]: !prev[k] }));
  };
  const isEdit = (sk, exId) => !!editing[`${sk}__${exId}`];

  return (
    <div style={S.app}>
      <header style={S.header}>
        <button style={S.backBtn} onClick={onBack}>← Zurück</button>
        <div style={S.logo}>Verlauf</div>
        <div />
      </header>
      <div style={S.scroll}>
        {sessions.length === 0 && <div style={{ color: "#444", textAlign: "center", marginTop: 60, fontSize: 15 }}>Noch keine Einheiten aufgezeichnet.</div>}
        {sessions.map(s => (
          <div key={s.key} style={S.card}>
            <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 14 }}>
              <div style={{ width: 10, height: 10, borderRadius: "50%", background: s.day.color, flexShrink: 0 }} />
              <div>
                <div style={{ color: s.day.color, fontWeight: 700, fontSize: 14 }}>{s.day.title}</div>
                <div style={{ fontSize: 12, color: "#555", marginTop: 2 }}>{s.date}</div>
              </div>
              <div style={{ marginLeft: "auto", fontSize: 12, fontWeight: 700, color: s.day.color }}>{s.done}/{s.total} Sätze</div>
            </div>
            {s.day.exercises.map(ex => {
              const exLog   = s.log[ex.id] ?? {};
              const allSets = Object.entries(exLog);
              if (!allSets.length) return null;
              const editMode = isEdit(s.key, ex.id);
              return (
                <div key={ex.id} style={{ marginBottom: 12 }}>
                  <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 4 }}>
                    <div style={{ fontSize: 12, color: "#888", fontWeight: 700 }}>{ex.name}</div>
                    <button style={{ background: "transparent", border: "1px solid #2a2a3a", color: "#666", borderRadius: 6, fontSize: 11, padding: "2px 8px", cursor: "pointer" }}
                      onClick={() => toggleEdit(s.key, ex.id)}>
                      {editMode ? "Fertig" : "Bearbeiten"}
                    </button>
                  </div>
                  {!editMode ? (
                    <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                      {allSets.map(([si, v]) => (
                        <span key={si} style={{ background: "#1A1A2E", borderRadius: 6, padding: "3px 8px", fontSize: 12, color: "#bbb", opacity: v.done ? 1 : 0.4 }}>
                          {v.weight !== "" && v.weight != null ? `${v.weight}${ex.unit}` : "–"}{v.weight != null && v.weight !== "" && v.reps ? " × " : ""}{v.reps || ""}
                        </span>
                      ))}
                    </div>
                  ) : (
                    <div style={{ display: "flex", flexDirection: "column", gap: 5, marginTop: 6 }}>
                      <div style={{ display: "grid", gridTemplateColumns: "24px 1fr 1fr 32px 32px", gap: 5, fontSize: 10, color: "#444", textTransform: "uppercase", letterSpacing: 0.5 }}>
                        <span>Nr</span><span>Gewicht ({ex.unit})</span><span>Wdh.</span>
                        <span style={{ textAlign: "center" }}>Done</span>
                        <span style={{ textAlign: "center" }}>Lös.</span>
                      </div>
                      {allSets.map(([si, v]) => (
                        <div key={si} style={{ display: "grid", gridTemplateColumns: "24px 1fr 1fr 32px 32px", gap: 5, alignItems: "center" }}>
                          <span style={{ color: s.day.color, fontWeight: 800, textAlign: "center", fontSize: 13 }}>{Number(si) + 1}</span>
                          <input type="number" style={S.inputSm} placeholder="–" value={v.weight ?? ""}
                            onChange={e => histSetValue(s.key, ex.id, si, "weight", e.target.value)} />
                          <input type="number" style={S.inputSm} placeholder="–" value={v.reps ?? ""}
                            onChange={e => histSetValue(s.key, ex.id, si, "reps", e.target.value)} />
                          <button style={{ border: "none", borderRadius: 6, fontSize: 14, fontWeight: 900, cursor: "pointer", padding: "5px 0", width: "100%", background: v.done ? "#22c55e" : "#2a2a2a", color: v.done ? "#000" : "#666" }}
                            onClick={() => histSetValue(s.key, ex.id, si, "done", !v.done)}>✓</button>
                          <button style={{ background: "transparent", border: "1px solid #3a1a1a", color: "#ef4444", borderRadius: 6, fontSize: 13, fontWeight: 700, cursor: "pointer", padding: "4px 0", width: "100%" }}
                            onClick={() => histDeleteSet(s.key, ex.id, si)}>✕</button>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        ))}
        <div style={{ height: 40 }} />
      </div>
    </div>
  );
}

function Toast({ msg }) {
  return <div style={{ position: "fixed", bottom: 24, left: "50%", transform: "translateX(-50%)", background: "#1A1A2E", border: "1px solid #333", color: "#E8E8F0", borderRadius: 12, padding: "10px 20px", fontSize: 14, fontWeight: 600, zIndex: 999, whiteSpace: "nowrap", boxShadow: "0 4px 24px rgba(0,0,0,0.6)", animation: "fadeInUp 0.3s ease" }}>{msg}</div>;
}

const S = {
  app:      { minHeight: "100vh", background: "#0A0A0F", color: "#E8E8F0", fontFamily: "'Barlow', sans-serif", display: "flex", flexDirection: "column", maxWidth: 480, margin: "0 auto" },
  header:   { display: "flex", alignItems: "center", justifyContent: "space-between", padding: "14px 20px", background: "#0D0D14", borderBottom: "1px solid #1E1E2E", position: "sticky", top: 0, zIndex: 100, gap: 10 },
  logo:     { fontSize: 20, fontWeight: 800, letterSpacing: 1, color: "#FF6B35" },
  histBtn:  { background: "transparent", border: "1px solid #333", color: "#aaa", borderRadius: 8, padding: "6px 14px", cursor: "pointer", fontSize: 13, flexShrink: 0 },
  loginBtn: { background: "transparent", border: "1px solid #4285F4", color: "#4285F4", borderRadius: 8, padding: "5px 12px", cursor: "pointer", fontSize: 12, fontWeight: 700, flexShrink: 0 },
  backBtn:  { background: "transparent", border: "none", color: "#aaa", cursor: "pointer", fontSize: 16, padding: 0 },
  h1:       { fontSize: 28, fontWeight: 800, margin: 0, letterSpacing: 0.5 },
  dayGrid:  { display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14, padding: "16px 20px" },
  dayCard:  { background: "#12121C", border: "1px solid #1E1E2E", borderRadius: 18, padding: "20px 16px", textAlign: "left", cursor: "pointer", display: "flex", flexDirection: "column", gap: 4, transition: "transform 0.15s", position: "relative", overflow: "hidden" },
  scroll:   { flex: 1, overflowY: "auto", padding: "12px 16px", display: "flex", flexDirection: "column", gap: 14 },
  card:     { background: "#12121C", border: "1px solid #1E1E2E", borderRadius: 16, padding: 16 },
  input:    { background: "#0A0A0F", border: "1px solid #252535", borderRadius: 8,  color: "#E8E8F0", fontSize: 16, fontWeight: 700, padding: "6px 8px", width: "100%", textAlign: "center", outline: "none", boxSizing: "border-box" },
  inputSm:  { background: "#0A0A0F", border: "1px solid #252535", borderRadius: 6,  color: "#E8E8F0", fontSize: 13, fontWeight: 700, padding: "5px 4px", width: "100%", textAlign: "center", outline: "none", boxSizing: "border-box" },
  doneBtn:  { border: "none", borderRadius: 8, color: "#000", fontSize: 16, fontWeight: 900, cursor: "pointer", padding: "6px 0", width: 44, transition: "background 0.2s" },
};

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
