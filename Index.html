<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gym</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--accent:#e8ff47;--at:#000}
[data-theme="dark"]{--bg:#0d0d0f;--bg2:#141418;--bg3:#1c1c22;--card:#18181e;--card2:#202028;--text:#f0f0f0;--t2:#909099;--t3:#55555f;--border:rgba(255,255,255,0.07);--b2:rgba(255,255,255,0.13);--green:#39e07a;--red:#ff4d6d;--gold:#ffc94d;--purple:#7c5cfc;--orange:#ff6b35;--cg:rgba(255,255,255,0.05);--ct:rgba(255,255,255,0.3)}
[data-theme="light"]{--bg:#f2f2f5;--bg2:#fff;--bg3:#e8e8ee;--card:#fff;--card2:#f8f8fb;--text:#111118;--t2:#5a5a6a;--t3:#aaaabc;--border:rgba(0,0,0,0.08);--b2:rgba(0,0,0,0.14);--green:#16a84a;--red:#e02040;--gold:#d4820a;--purple:#7c5cfc;--orange:#ff6b35;--cg:rgba(0,0,0,0.06);--ct:rgba(0,0,0,0.35)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
/* TOP BAR */
.top-bar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:58px;position:sticky;top:0;z-index:100}
.logo-wrap{display:flex;align-items:center;gap:10px}
.logo-icon{width:36px;height:36px;background:var(--accent);border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background 0.3s}
.logo-text{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:900;letter-spacing:0.06em;color:var(--text);text-transform:uppercase}
.top-actions{display:flex;align-items:center;gap:6px}
.icon-btn{width:34px;height:34px;border-radius:8px;border:1px solid var(--b2);background:transparent;color:var(--t2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
.icon-btn:hover{border-color:var(--accent);color:var(--accent)}
.top-btn{padding:6px 12px;background:transparent;border:1px solid var(--b2);border-radius:8px;color:var(--t2);font-size:12px;font-weight:600;cursor:pointer;font-family:'Barlow',sans-serif;transition:all 0.15s}
.top-btn:hover{border-color:var(--accent);color:var(--accent)}
/* STREAK BAR */
.streak-bar{background:var(--bg2);border-bottom:1px solid var(--border);padding:9px 1.5rem;display:flex;align-items:center;gap:14px;overflow-x:auto}
.streak-info{display:flex;align-items:center;gap:8px;flex-shrink:0}
.streak-flames{display:flex;gap:2px;align-items:center}
.flame{font-size:18px;animation:flicker 1.5s ease-in-out infinite alternate}
@keyframes flicker{0%{opacity:1;transform:scale(1)}100%{opacity:.85;transform:scale(1.1)}}
.streak-count{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:900;color:var(--accent);line-height:1;transition:color 0.3s}
.streak-sub{font-size:10px;color:var(--t3);font-weight:600;text-transform:uppercase;letter-spacing:.04em;line-height:1.4}
.week-days{display:flex;gap:5px;flex:1;justify-content:flex-end}
.day-dot{display:flex;flex-direction:column;align-items:center;gap:3px;min-width:34px}
.day-name{font-size:9px;color:var(--t3);font-weight:700;text-transform:uppercase}
.day-circle{width:30px;height:30px;border-radius:50%;border:1.5px solid var(--b2);display:flex;align-items:center;justify-content:center;font-size:11px;cursor:pointer;transition:all 0.15s;background:var(--bg3);color:var(--t3);font-weight:700;font-family:'Barlow Condensed',sans-serif}
.day-circle.gym{background:var(--accent);border-color:var(--accent);color:var(--at);transition:background 0.3s}
.day-circle.rest{border-color:var(--orange);color:var(--orange)}
.day-circle.today{box-shadow:0 0 0 2px var(--purple)}
.day-circle.suggest-rest{border-color:var(--red);color:var(--red)}
/* MAIN */
.main{max-width:720px;margin:0 auto;padding:1.25rem}
/* NAV */
.nav-pills{display:flex;gap:5px;margin-bottom:1.25rem;flex-wrap:wrap}
.nav-pill{padding:7px 15px;border-radius:20px;border:1px solid var(--b2);background:transparent;color:var(--t2);font-size:13px;font-weight:600;cursor:pointer;font-family:'Barlow',sans-serif;transition:all 0.15s}
.nav-pill.active{background:var(--accent);color:var(--at);border-color:var(--accent);transition:background 0.3s,color 0.3s}
.page{display:none}.page.active{display:block}
/* COLOR PICKER PANEL */
.color-panel{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px 18px;margin-bottom:1.25rem}
.color-panel-title{font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:12px}
.color-swatches{display:flex;gap:10px;flex-wrap:wrap}
.swatch{width:34px;height:34px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all 0.15s;flex-shrink:0}
.swatch.active{border-color:var(--text);transform:scale(1.15)}
.swatch:hover{transform:scale(1.1)}
/* REST BANNER */
.rest-banner{background:rgba(255,77,109,0.08);border:1px solid rgba(255,77,109,0.25);border-radius:12px;padding:12px 16px;margin-bottom:1.25rem;display:flex;align-items:center;gap:10px}
.rest-banner-text{font-size:13px;color:var(--t2);flex:1}
.rest-banner-text strong{color:var(--red);font-weight:700}
.rest-mark-btn{padding:7px 14px;background:var(--red);color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Barlow',sans-serif;white-space:nowrap}
/* OVERVIEW */
.overview-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:1.25rem}
.ov-label{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px}
.ov-wrap{height:90px}
/* DAY TABS */
.day-tabs{display:flex;gap:0;background:var(--bg2);border-radius:12px;border:1px solid var(--border);padding:4px;margin-bottom:1.25rem}
.day-tab{flex:1;padding:10px 8px;border-radius:9px;border:none;font-family:'Barlow Condensed',sans-serif;font-size:19px;font-weight:800;letter-spacing:.06em;cursor:pointer;background:transparent;color:var(--t2);transition:all 0.15s;text-transform:uppercase}
.day-tab.active{background:var(--accent);color:var(--at)}
/* TIMER ROW - side by side like before */
.timer-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1.25rem}
.timer-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 16px}
.tc-label{font-size:10px;color:var(--t3);font-weight:700;text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px}
.tc-val{font-family:'Barlow Condensed',sans-serif;font-size:32px;font-weight:900;color:var(--accent);letter-spacing:.04em;margin-bottom:8px;line-height:1;transition:color 0.3s}
.tc-val.neutral{color:var(--text)}.tc-val.done{color:var(--green)}
.tc-prog{height:3px;background:var(--bg3);border-radius:2px;margin-bottom:10px;overflow:hidden}
.tc-fill{height:100%;background:var(--accent);border-radius:2px;transition:width 0.5s linear,background 0.3s}
.tc-btns{display:flex;gap:6px}
.tc-btn{padding:7px 13px;border-radius:8px;border:1px solid var(--b2);background:transparent;color:var(--t2);font-size:11px;font-weight:700;cursor:pointer;font-family:'Barlow',sans-serif;text-transform:uppercase;letter-spacing:.05em;transition:all 0.15s}
.tc-btn:hover{border-color:var(--accent);color:var(--accent)}
.tc-btn.go{background:var(--accent);color:var(--at);border-color:var(--accent);transition:background 0.3s}
.tc-btn.stop{background:var(--red);color:#fff;border-color:var(--red)}
/* SHOW TIMER BTN */
.show-timer-btn{position:fixed;bottom:24px;right:24px;width:48px;height:48px;background:var(--accent);border:none;border-radius:50%;cursor:pointer;display:none;align-items:center;justify-content:center;z-index:490;transition:background 0.3s}
/* FLOATING TIMER */
.float-timer{position:fixed;background:var(--card);border:1px solid var(--b2);border-radius:16px;padding:16px 18px;z-index:500;user-select:none;width:240px;box-shadow:0 8px 32px rgba(0,0,0,0.35)}
.ft-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:6px}
.ft-title{font-size:10px;color:var(--t3);font-weight:700;text-transform:uppercase;letter-spacing:.06em}
.ft-controls{display:flex;gap:4px;flex-shrink:0}
.ft-ctrl{width:22px;height:22px;border-radius:6px;border:1px solid var(--b2);background:transparent;color:var(--t3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;transition:all 0.15s;flex-shrink:0}
.ft-ctrl:hover{border-color:var(--accent);color:var(--accent)}
.ft-ctrl.close:hover{border-color:var(--red);color:var(--red)}
.ft-display{font-family:'Barlow Condensed',sans-serif;font-size:48px;font-weight:900;color:var(--accent);line-height:1;margin-bottom:8px;letter-spacing:.04em;transition:color 0.3s}
.ft-display.done{color:var(--green)}
.ft-prog{height:4px;background:var(--bg3);border-radius:2px;margin-bottom:12px;overflow:hidden;width:100%}
.ft-fill{height:100%;background:var(--accent);border-radius:2px;transition:width 0.5s linear,background 0.3s}
.ft-btns{display:flex;gap:6px;width:100%}
.ft-btn{padding:8px 14px;border-radius:9px;border:1px solid var(--b2);background:transparent;color:var(--t2);font-size:12px;font-weight:700;cursor:pointer;font-family:'Barlow',sans-serif;text-transform:uppercase;letter-spacing:.04em;transition:all 0.15s;flex:1}
.ft-btn:hover{border-color:var(--accent);color:var(--accent)}
.ft-btn.go{background:var(--accent);color:var(--at);border-color:var(--accent);transition:background 0.3s}
.ft-btn.stop{background:var(--red);color:#fff;border-color:var(--red)}
/* EXERCISE CARDS */
.ex-card{background:var(--card);border:1px solid var(--border);border-radius:14px;margin-bottom:10px;overflow:hidden;transition:border-color 0.2s}
.ex-card.completed{border-color:rgba(57,224,122,0.35)}
.ex-header{display:flex;align-items:center;gap:10px;padding:14px 16px;cursor:pointer;user-select:none;transition:background 0.15s}
.ex-header:hover{background:var(--card2)}
.ex-name{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;color:var(--text);letter-spacing:.03em;flex:1}
.pr-badge{font-size:10px;font-weight:800;color:var(--gold);background:rgba(255,201,77,0.12);border:1px solid rgba(255,201,77,0.3);padding:2px 7px;border-radius:6px;letter-spacing:.05em;display:none}
.ai-badge{font-size:10px;font-weight:800;color:var(--purple);background:rgba(124,92,252,0.12);border:1px solid rgba(124,92,252,0.3);padding:2px 7px;border-radius:6px}
.ex-pill{font-size:11px;font-weight:700;color:var(--t3);background:var(--bg3);padding:3px 10px;border-radius:20px;white-space:nowrap}
.ex-pill.done{color:var(--green);background:rgba(57,224,122,0.1)}
.chevron{width:16px;height:16px;color:var(--t3);transition:transform 0.2s;flex-shrink:0}
.chevron.open{transform:rotate(180deg)}
.ex-body{display:none;border-top:1px solid var(--border)}.ex-body.open{display:block}
.chart-area{padding:14px 16px 0}
.chart-label{font-size:10px;color:var(--t3);font-weight:700;text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px}
.chart-con{height:70px}
.chart-nodata{font-size:12px;color:var(--t3);padding:18px 0;text-align:center;font-style:italic}
/* PAUSE DURATION PER EXERCISE */
.pause-setting{display:flex;align-items:center;gap:8px;padding:10px 16px 0;border-top:1px solid var(--border);margin-top:10px}
.pause-setting-label{font-size:11px;color:var(--t3);font-weight:600;flex:1}
.pause-dur-inp{width:48px;height:26px;background:var(--bg3);border:1px solid var(--b2);border-radius:7px;color:var(--text);font-size:13px;font-weight:600;text-align:center;font-family:'Barlow',sans-serif;padding:0}
.pause-dur-inp:focus{outline:none;border-color:var(--accent)}
.pause-unit{font-size:11px;color:var(--t3)}
/* SETS */
.sets-area{padding:10px 16px}
.set-row{display:grid;grid-template-columns:28px 24px 76px 1fr;gap:6px;align-items:center;margin-bottom:7px;padding:8px 10px;border-radius:10px;background:var(--bg3);border:1px solid transparent;transition:all 0.2s}
.set-row.checked{background:rgba(57,224,122,0.05);border-color:rgba(57,224,122,0.18)}
.set-check{width:26px;height:26px;border-radius:7px;border:1.5px solid var(--b2);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.15s}
.set-check.done{background:var(--green);border-color:var(--green)}
.set-num{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;color:var(--t3);text-align:center}
.ig{display:flex;flex-direction:column;gap:2px}
.ig-label{font-size:9px;color:var(--t3);font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.stepper{display:flex;align-items:center;gap:3px}
.sbtn{width:26px;height:26px;border:1px solid var(--b2);background:var(--card);border-radius:6px;cursor:pointer;font-size:10px;font-weight:700;color:var(--t2);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.15s;font-family:'Barlow',sans-serif}
.sbtn:hover{border-color:var(--accent);color:var(--accent)}
.vi{width:42px;height:26px;text-align:center;border:1px solid var(--b2);border-radius:6px;font-size:13px;font-weight:600;background:var(--bg2);color:var(--text);padding:0;font-family:'Barlow',sans-serif}
.vi:focus{outline:none;border-color:var(--accent)}
.vi.reps{width:48px}
.ai-hint{font-size:10px;color:var(--purple);margin-top:3px;display:flex;align-items:center;gap:3px}
.set-mgmt{display:flex;gap:8px;padding:2px 16px 10px}
.smb{padding:6px 12px;border-radius:8px;border:1px dashed var(--b2);background:transparent;color:var(--t3);font-size:12px;font-weight:600;cursor:pointer;transition:all 0.15s;font-family:'Barlow',sans-serif}
.smb:hover{border-color:var(--accent);color:var(--accent)}
.smb.del:hover{border-color:var(--red);color:var(--red)}
/* NOTES */
.notes-toggle{display:flex;align-items:center;gap:6px;padding:0 16px 6px;cursor:pointer}
.notes-toggle-label{font-size:11px;color:var(--t3);font-weight:600}
.ntoggle-icon{width:13px;height:13px;color:var(--t3);transition:transform 0.2s}
.ntoggle-icon.open{transform:rotate(180deg)}
.notes-area{padding:0 16px 12px;display:none}
.notes-area.open{display:block}
.notes-input{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:9px;color:var(--text);font-size:13px;font-family:'Barlow',sans-serif;padding:8px 12px;resize:none;min-height:50px;transition:border-color 0.15s}
.notes-input::placeholder{color:var(--t3)}
.notes-input:focus{outline:none;border-color:var(--purple)}
/* SAVE BTN */
.save-btn{width:100%;margin-top:1.25rem;padding:15px;background:var(--accent);color:var(--at);border:none;border-radius:14px;font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:900;letter-spacing:.07em;cursor:pointer;text-transform:uppercase;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:8px}
.save-btn:hover{opacity:.88;transform:translateY(-1px)}
/* WEIGHT PAGE */
.weight-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px}
.weight-input-row{display:flex;gap:10px;align-items:center;margin-bottom:14px}
.weight-big-input{flex:1;height:48px;background:var(--bg3);border:1px solid var(--b2);border-radius:12px;color:var(--text);font-size:20px;font-weight:700;text-align:center;font-family:'Barlow Condensed',sans-serif;padding:0}
.weight-big-input:focus{outline:none;border-color:var(--accent)}
.weight-unit{font-size:14px;color:var(--t2);font-weight:600}
.weight-add-btn{padding:13px 20px;background:var(--accent);color:var(--at);border:none;border-radius:12px;font-size:14px;font-weight:800;cursor:pointer;font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;letter-spacing:.04em;transition:background 0.3s}
.weight-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.wstat{background:var(--bg3);border-radius:9px;padding:10px;text-align:center}
.wstat-label{font-size:9px;color:var(--t3);font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px}
.wstat-val{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:900;color:var(--text)}
.wstat-val.up{color:var(--green)}.wstat-val.down{color:var(--red)}
.weight-chart-wrap{height:130px;margin-bottom:16px}
/* WEIGHT LIST */
.weight-list-title{font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px}
.weight-list-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg3);border-radius:10px;margin-bottom:6px}
.wli-date{font-size:12px;color:var(--t3);flex:1}
.wli-val{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:800;color:var(--text)}
.wli-del{width:24px;height:24px;border-radius:6px;border:1px solid transparent;background:transparent;color:var(--t3);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
.wli-del:hover{border-color:var(--red);color:var(--red)}
/* MONTH */
.month-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px}
.month-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.month-title{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;color:var(--text);letter-spacing:.04em}
.month-nav{width:30px;height:30px;border-radius:8px;border:1px solid var(--b2);background:transparent;color:var(--t2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
.month-nav:hover{border-color:var(--accent);color:var(--accent)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-dayname{font-size:10px;font-weight:700;color:var(--t3);text-align:center;padding:3px 0;text-transform:uppercase}
.cal-day{height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--t3);cursor:pointer;transition:all 0.15s}
.cal-day:hover{background:var(--bg3)}
.cal-day.gym{background:var(--accent);color:var(--at);transition:background 0.3s}
.cal-day.rest{background:rgba(255,107,53,0.15);color:var(--orange);border:1px solid rgba(255,107,53,0.3)}
.cal-day.today{box-shadow:0 0 0 2px var(--purple)}
.cal-day.empty{cursor:default}.cal-day.empty:hover{background:transparent}
.month-stats{display:flex;gap:14px;margin-top:14px;padding-top:14px;border-top:1px solid var(--border)}
.mstat{text-align:center;flex:1}
.mstat-num{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:900;color:var(--accent);transition:color 0.3s}
.mstat-label{font-size:10px;color:var(--t3);font-weight:600;text-transform:uppercase;letter-spacing:.04em}
/* MUSCLE */
.muscle-body-row{display:flex;gap:18px;align-items:flex-start;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px}
.muscle-legend{display:flex;flex-direction:column;gap:8px;flex:1}
.leg-row{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--t2)}
.leg-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0}
.muscle-bars-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px}
.mbar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.mbar-row:last-child{margin-bottom:0}
.mbar-label{font-size:12px;color:var(--t2);width:90px;flex-shrink:0}
.mbar-bg{flex:1;height:8px;background:var(--bg3);border-radius:4px;overflow:hidden}
.mbar-fill{height:100%;border-radius:4px;transition:width 0.5s}
.mbar-num{font-size:12px;font-weight:700;color:var(--text);min-width:24px;text-align:right}
/* MANAGE */
.manage-tabs{display:flex;gap:0;background:var(--bg2);border-radius:12px;border:1px solid var(--border);padding:4px;margin-bottom:1.25rem}
.manage-tab{flex:1;padding:9px;border-radius:9px;border:none;font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;cursor:pointer;background:transparent;color:var(--t2);transition:all 0.15s;text-transform:uppercase}
.manage-tab.active{background:var(--accent);color:var(--at)}
.ex-edit-card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:10px}
.ex-edit-row{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--border);transition:background 0.15s}
.ex-edit-row:last-child{border-bottom:none}
.ex-edit-row.dragging{opacity:.4}.ex-edit-row.drag-over{background:rgba(232,255,71,0.05)}
.drag-handle{display:flex;flex-direction:column;gap:3px;cursor:grab;flex-shrink:0;padding:2px}
.drag-line{width:16px;height:1.5px;background:var(--t3);border-radius:1px}
.ex-edit-name{flex:1;font-size:14px;font-weight:600;color:var(--text);background:transparent;border:none;font-family:'Barlow',sans-serif;padding:0}
.ex-edit-name:focus{outline:none}
.ex-edit-name.editing{background:var(--bg3);border:1px solid var(--accent);border-radius:7px;padding:4px 8px}
.edit-actions{display:flex;gap:5px;flex-shrink:0}
.eabtn{width:30px;height:30px;border-radius:7px;border:1px solid var(--b2);background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.15s;color:var(--t2)}
.eabtn:hover{border-color:var(--accent);color:var(--accent)}
.eabtn.save-edit{border-color:var(--accent);color:var(--accent)}
.eabtn.del-ex:hover{border-color:var(--red);color:var(--red)}
.add-ex-row{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;border-top:1px solid var(--border);transition:background 0.15s}
.add-ex-row:hover{background:var(--card2)}
.add-ex-icon{width:30px;height:30px;border-radius:7px;background:var(--accent);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background 0.3s}
.add-ex-label{font-size:13px;color:var(--t3);font-weight:600}
.add-ex-input{flex:1;background:var(--bg3);border:1px solid var(--accent);border-radius:8px;color:var(--text);font-size:13px;font-family:'Barlow',sans-serif;padding:6px 10px;display:none}
.add-ex-input:focus{outline:none}
/* HISTORY */
.hist-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:8px}
.hist-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.hist-day{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:800;color:var(--accent);letter-spacing:.04em;transition:color 0.3s}
.hist-date{font-size:12px;color:var(--t3)}
.hist-del{width:26px;height:26px;border-radius:7px;border:1px solid transparent;background:transparent;color:var(--t3);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
.hist-del:hover{border-color:var(--red);color:var(--red)}
.hist-row{display:flex;justify-content:space-between;font-size:12px;padding:2px 0;color:var(--t2)}
.hist-row span:last-child{color:var(--t3)}
/* TOAST / MODAL */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:var(--accent);color:var(--at);padding:11px 24px;border-radius:12px;font-size:13px;font-weight:800;opacity:0;transition:opacity 0.3s,background 0.3s;pointer-events:none;z-index:999;font-family:'Barlow Condensed',sans-serif;letter-spacing:.06em;text-transform:uppercase;white-space:nowrap}
.toast.show{opacity:1}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:600;display:none;align-items:center;justify-content:center;padding:1rem}
.modal-bg.open{display:flex}
.modal{background:var(--card);border:1px solid var(--b2);border-radius:16px;padding:1.5rem;max-width:320px;width:100%;text-align:center}
.modal h3{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;color:var(--text);margin-bottom:8px}
.modal p{font-size:13px;color:var(--t2);margin-bottom:20px;line-height:1.5}
.modal-btns{display:flex;gap:10px;justify-content:center}
.mbtn{padding:10px 22px;border-radius:10px;border:1px solid var(--b2);background:transparent;color:var(--t2);font-size:13px;font-weight:600;cursor:pointer;font-family:'Barlow',sans-serif;transition:all 0.15s}
.mbtn.confirm{background:var(--red);color:#fff;border-color:var(--red)}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}
</style>
</head>

<!-- FLOATING TIMER -->
<div class="float-timer" id="float-timer" style="bottom:24px;right:24px">

    <span class="ft-title" id="ft-title">Pause</span>
    <div class="ft-controls">
      <button class="ft-ctrl" onclick="toggleFTFullscreen()" title="Vollbild">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
      </button>
      <button class="ft-ctrl close" onclick="hideTimer()" title="Verstecken">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

</div>

<!-- SHOW TIMER BUTTON -->
<button class="show-timer-btn" id="show-timer-btn" onclick="showTimer()" style="display:none">

</button>

<div class="main">
  <div class="nav-pills">
    <button class="nav-pill active" onclick="showPage('workout',this)">Workout</button>
    <button class="nav-pill" onclick="showPage('muscles',this)">Muskeln</button>

    <button class="nav-pill" onclick="showPage('month',this)">Monat</button>
    <button class="nav-pill" onclick="showPage('manage',this)">Ubungen</button>
    <button class="nav-pill" onclick="showPage('history',this)">Verlauf</button>

  <!-- WORKOUT -->

    <div id="rest-banner" style="display:none" class="rest-banner">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--red)" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      <div class="rest-banner-text"><strong>Ruhetag empfohlen!</strong> Du hast 3 Tage in Folge trainiert.</div>
      <button class="rest-mark-btn" onclick="markRestToday()">Als Ruhetag</button>

    <!-- TIMER ROW: side by side -->
    <div class="timer-row">
      <div class="timer-card">
        <div class="tc-label">Workout-Zeit</div>
        <div class="tc-val neutral" id="wt-display">00:00</div>
        <div class="tc-btns">
          <button class="tc-btn go" id="wt-btn" onclick="toggleWT()">Start</button>
          <button class="tc-btn" onclick="resetWT()">Reset</button>
        </div>
      </div>
      <div class="timer-card">
        <div class="tc-label">Pause</div>
        <div class="tc-val" id="pause-display2">3:00</div>
        <div class="tc-prog"><div class="tc-fill" id="pause-fill2" style="width:100%"></div></div>
        <div class="tc-btns">
          <button class="tc-btn go" id="pause-btn2" onclick="togglePause()">Start</button>

    <div class="overview-card">

      Einheit speichern

  <!-- MUSKELN -->

  <!-- GEWICHT -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
// ── COLORS ────────────────────────────────────────────────────────
const COLORS=[
  {name:'Gruen',hex:'#00FF66',text:'#000'},
  {name:'Cyan',hex:'#00CFFF',text:'#000'},
  {name:'Orange',hex:'#FF7A00',text:'#fff'},
  {name:'Rot',hex:'#FF4444',text:'#fff'},
  {name:'Blau',hex:'#2363EB',text:'#fff'},
  {name:'Dunkelgruen',hex:'#128C4E',text:'#fff'},
  {name:'Dunkelorange',hex:'#F26014',text:'#fff'},
  {name:'Grau',hex:'#757575',text:'#fff'},
];
let currentColor=localStorage.getItem('gym_color')||'#00FF66';
let currentColorText=localStorage.getItem('gym_color_text')||'#000';

function applyColor(hex,text){
  currentColor=hex;currentColorText=text;
  document.documentElement.style.setProperty('--accent',hex);
  document.documentElement.style.setProperty('--at',text);
  localStorage.setItem('gym_color',hex);
  localStorage.setItem('gym_color_text',text);
  renderSwatches();
  setTimeout(()=>{drawOvChart();redrawOpenCharts();},100);
}
function renderSwatches(){
  document.getElementById('color-swatches').innerHTML=COLORS.map(c=>`
    <div class="swatch${c.hex===currentColor?' active':''}" style="background:${c.hex}" onclick="applyColor('${c.hex}','${c.text}')" title="${c.name}"></div>
  `).join('');
}

// ── DATA ──────────────────────────────────────────────────────────
const MUSCLE_COLORS={'Brust':'#e8ff47','Schultern':'#e8ff47','Trizeps':'#ff6b35','Ruecken':'#7c5cfc','Bizeps':'#7c5cfc','Beine':'#39e07a','Bauch':'#909099','Waden':'#39e07a'};
const ALL_MUSCLES=['Brust','Schultern','Trizeps','Ruecken','Bizeps','Beine','Bauch','Waden'];
const DEFAULT_DAYS={
  push:{name:'Push',exercises:[
    {name:'Brustpresse',unit:'kg',muscles:['Brust','Schultern','Trizeps'],pauseMins:3},
    {name:'Butterfly',unit:'kg',muscles:['Brust'],pauseMins:3},
    {name:'Brustpresse (positiv)',unit:'kg',muscles:['Brust','Schultern'],pauseMins:3},
    {name:'Schulterpresse',unit:'kg',muscles:['Schultern','Trizeps'],pauseMins:3},
    {name:'Seitheben am Kabelzug',unit:'kg',muscles:['Schultern'],pauseMins:3},
    {name:'Trizepsdruecken Kabelzug',unit:'kg',muscles:['Trizeps'],pauseMins:3},
    {name:'Dips (Maschine)',unit:'kg',muscles:['Trizeps','Brust'],pauseMins:3}
  ]},
  pull:{name:'Pull',exercises:[
    {name:'Rudermaschine',unit:'kg',muscles:['Ruecken','Bizeps'],pauseMins:3},
    {name:'Klimmzuge (Maschine)',unit:'kg',muscles:['Ruecken','Bizeps'],pauseMins:3},
    {name:'Latzug (enger Griff)',unit:'kg',muscles:['Ruecken','Bizeps'],pauseMins:3},
    {name:'Butterfly reverse',unit:'kg',muscles:['Ruecken','Schultern'],pauseMins:3},
    {name:'Hammer-Curls Kabelzug',unit:'kg',muscles:['Bizeps'],pauseMins:3},
    {name:'Bizeps-Curls Kurzhanteln',unit:'kg',muscles:['Bizeps'],pauseMins:3},
    {name:'Sit-Ups',unit:'',muscles:['Bauch'],pauseMins:2}
  ]},
  beine:{name:'Beine',exercises:[
    {name:'Beinstrecker',unit:'kg',muscles:['Beine'],pauseMins:3},
    {name:'Beinpresse',unit:'kg',muscles:['Beine'],pauseMins:3},
    {name:'Beinbeuger',unit:'kg',muscles:['Beine'],pauseMins:3},
    {name:'Ausfallschritte',unit:'kg',muscles:['Beine'],pauseMins:3},
    {name:'Adduktoren (Maschine)',unit:'kg',muscles:['Beine'],pauseMins:3},
    {name:'Abduktoren (Maschine)',unit:'kg',muscles:['Beine'],pauseMins:3},
    {name:'Wadenheben (stehend)',unit:'kg',muscles:['Waden'],pauseMins:2}
  ]}
};
function loadDays(){const s=localStorage.getItem('gym_days');if(s){try{return JSON.parse(s);}catch(e){}}return JSON.parse(JSON.stringify(DEFAULT_DAYS));}
function saveDays(){localStorage.setItem('gym_days',JSON.stringify(DAYS));}
let DAYS=loadDays();
let currentDay='push',manageDay2='push';
let state={},openCards={},charts={},notesOpen={};
let deleteIndex=null,ovChart=null,weightChart=null,calMonth=new Date();

// ── THEME ─────────────────────────────────────────────────────────
function toggleTheme(){const h=document.documentElement,dark=h.getAttribute('data-theme')==='dark';setTheme(dark?'light':'dark');}
function setTheme(t){document.documentElement.setAttribute('data-theme',t);localStorage.setItem('gym_theme',t);updateThemeIcon();setTimeout(()=>{drawOvChart();redrawOpenCharts();},200);}
function updateThemeIcon(){
  const dark=document.documentElement.getAttribute('data-theme')==='dark';
  document.getElementById('theme-icon').innerHTML=dark
    ?'<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>'
    :'<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
}
function redrawOpenCharts(){Object.keys(openCards).forEach(k=>{if(openCards[k]){const[d,i]=k.split('-');drawChart(d,parseInt(i));}});}

// ── FLOATING TIMER (not draggable) ────────────────────────────────
const ftEl=document.getElementById('float-timer');
let ftFullscreen=false;

function toggleFTFullscreen(){
  ftFullscreen=!ftFullscreen;
  const ft=document.getElementById('float-timer');
  if(ftFullscreen){
    ft.style.cssText='position:fixed;inset:0;width:100%;height:100%;border-radius:0;z-index:500;background:var(--card);display:flex;align-items:center;justify-content:center;cursor:default;border:none;padding:0;box-shadow:none';
    buildCircleTimer();
  } else {
    ft.style.cssText='position:fixed;bottom:24px;right:24px;background:var(--card);border:1px solid var(--b2);border-radius:16px;padding:16px 18px;z-index:500;cursor:move;user-select:none;width:240px;box-shadow:0 8px 32px rgba(0,0,0,0.35)';
    rebuildNormalTimer();
  }
}
function buildCircleTimer(){
  const pct=pauseMax>0?Math.max(0,pauseLeft)/pauseMax:1;
  const circ=2*Math.PI*120;
  const offset=circ*(1-pct);
  const label=pauseLeft<=0?'Los!':fmt(pauseLeft);
  document.getElementById('float-timer').innerHTML=`
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:32px">
      <div style="position:relative;width:300px;height:300px">
        <svg width="300" height="300" viewBox="0 0 300 300" style="position:absolute;top:0;left:0">
          <circle cx="150" cy="150" r="120" fill="none" stroke="rgba(128,128,128,0.15)" stroke-width="14"/>
          <circle id="ft-circle-arc" cx="150" cy="150" r="120" fill="none" stroke="${currentColor}" stroke-width="14"
            stroke-linecap="round" stroke-dasharray="${circ}" stroke-dashoffset="${offset}"
            transform="rotate(-90 150 150)"
            style="transition:stroke-dashoffset 0.9s linear,stroke 0.3s"/>
          <text id="ft-display" x="150" y="166" text-anchor="middle" dominant-baseline="middle"
            font-family="Barlow Condensed,sans-serif" font-size="78" font-weight="900"
            fill="${currentColor}" style="transition:fill 0.3s">${label}</text>
        </svg>
      </div>
      <div style="display:flex;gap:14px">
        <button class="ft-btn ${pauseRunning?'stop':'go'}" id="ft-btn" onclick="togglePause()" style="padding:14px 32px;font-size:16px;border-radius:14px;min-width:110px">${pauseRunning?'Stop':'Start'}</button>
        <button class="ft-btn" onclick="resetPause()" style="padding:14px 24px;font-size:16px;border-radius:14px">Reset</button>
        <button class="ft-btn" onclick="toggleFTFullscreen()" style="padding:14px 20px;font-size:16px;border-radius:14px">

// ── STATE ─────────────────────────────────────────────────────────
function loadLastWeights(day){
  const saved=JSON.parse(localStorage.getItem('gym_history')||'[]');
  const last=saved.find(s=>s.day===DAYS[day].name);
  if(!last)return;
  DAYS[day].exercises.forEach((ex,ei)=>{
    const lx=last.exercises&&last.exercises.find(e=>e.name===ex.name);
    if(!lx)return;
    lx.sets.forEach((s,si)=>{if(state[day][ei]&&state[day][ei].sets[si]){state[day][ei].sets[si].weight=s.weight||20;state[day][ei].sets[si].reps=s.reps||10;}});
  });
}
function initState(day){
  if(state[day])return;
  state[day]=DAYS[day].exercises.map(ex=>({sets:Array.from({length:3},()=>({weight:20,reps:10,done:false})),note:''}));
  loadLastWeights(day);
}
function switchDay(day){
  currentDay=day;
  document.querySelectorAll('.day-tab').forEach((t,i)=>t.classList.toggle('active',['push','pull','beine'][i]===day));

}

// ── AI SUGGESTION ──────────────────────────────────────────────────
function getAI(dayName,exName){
  const saved=JSON.parse(localStorage.getItem('gym_history')||'[]');
  const sessions=saved.filter(s=>s.day===dayName).slice(0,5);
  if(sessions.length<2)return null;
  const weights=sessions.map(s=>{const ex=s.exercises?.find(e=>e.name===exName);return ex?Math.max(...ex.sets.map(x=>x.weight||0)):0;}).filter(x=>x>0);
  if(weights.length<2)return null;
  const avg=weights.reduce((a,b)=>a+b,0)/weights.length;
  const trend=weights[0]-weights[weights.length-1];
  return Math.round((avg+(trend>0?2.5:0))/2.5)*2.5;
}

// ── SET OPS ───────────────────────────────────────────────────────
function change(day,ei,si,field,delta){let v=Math.round((state[day][ei].sets[si][field]+delta)*10)/10;if(v<0)v=0;state[day][ei].sets[si][field]=v;const el=document.getElementById(day+'-'+ei+'-'+si+'-'+field);if(el)el.value=v;}
function setVal(day,ei,si,field,val){let v=parseFloat(val)||0;if(v<0)v=0;state[day][ei].sets[si][field]=v;}
function setNote(day,ei,val){state[day][ei].note=val;}
function addSet(day,ei){const last=state[day][ei].sets.slice(-1)[0];state[day][ei].sets.push({weight:last?last.weight:20,reps:last?last.reps:10,done:false});renderBody(day,ei);}
function removeSet(day,ei){if(state[day][ei].sets.length<=1)return;state[day][ei].sets.pop();renderBody(day,ei);}

function toggleSet(day,ei,si){
  const s=state[day][ei].sets[si];s.done=!s.done;
  const key=day+'-'+ei;
  const row=document.getElementById('sr-'+key+'-'+si);
  const chk=document.getElementById('chk-'+key+'-'+si);
  if(row)row.classList.toggle('checked',s.done);
  const dark=document.documentElement.getAttribute('data-theme')==='dark';
  if(chk){chk.classList.toggle('done',s.done);chk.innerHTML=s.done?`<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="${dark?'#000':'#fff'}" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>`:'';} 
  const sets=state[day][ei].sets;
  const done=sets.filter(x=>x.done).length,total=sets.length;
  const pillEl=document.getElementById('pill-'+key);
  if(pillEl){pillEl.textContent=done+'/'+total+' Satze';pillEl.className='ex-pill'+(done===total?' done':'');}
  document.getElementById('card-'+key)?.classList.toggle('completed',done===total&&total>0);
  const anyDone=state[day].some(ex=>ex.sets.some(s=>s.done));
  if(s.done&&anyDone&&!wtRunning)toggleWT();
  const allDone=state[day].every(ex=>ex.sets.every(s=>s.done));
  if(s.done&&allDone&&wtRunning){toggleWT();autoMarkGym();}
  if(s.done){
    const pauseMins=DAYS[day].exercises[ei].pauseMins||3;
    setPauseDuration(pauseMins);
    resetPause();togglePause();
  }
}

function autoMarkGym(){
  const today=dk(new Date());
  let g=JSON.parse(localStorage.getItem('gym_gym')||'[]');
  if(!g.includes(today)){g.push(today);localStorage.setItem('gym_gym',JSON.stringify(g));renderWeek();showToast('Tag automatisch markiert!');}
}

// ── CHARTS ────────────────────────────────────────────────────────
function cssVar(n){return getComputedStyle(document.documentElement).getPropertyValue(n).trim();}
function getPR(dayName,exName){const saved=JSON.parse(localStorage.getItem('gym_history')||'[]');let max=0;saved.filter(s=>s.day===dayName).forEach(s=>{const ex=s.exercises?.find(e=>e.name===exName);if(ex)ex.sets.forEach(s=>{if(s.weight>max)max=s.weight;});});return max;}
function getHistory(dayName,exName){const saved=JSON.parse(localStorage.getItem('gym_history')||'[]');return saved.filter(s=>s.day===dayName).reverse().slice(-10).map(s=>{const ex=s.exercises?.find(e=>e.name===exName);if(!ex)return null;return{label:s.date||'',weight:Math.max(...ex.sets.map(x=>x.weight||0))};}).filter(Boolean);}

function renderMonth(){
  const g=JSON.parse(localStorage.getItem('gym_gym')||'[]');
  const r=JSON.parse(localStorage.getItem('gym_rest')||'[]');
  const today=new Date(),y=calMonth.getFullYear(),m=calMonth.getMonth();
  const monthName=calMonth.toLocaleDateString('de-DE',{month:'long',year:'numeric'});
  const firstDay=new Date(y,m,1).getDay(),offset=(firstDay+6)%7;
  const daysInMonth=new Date(y,m+1,0).getDate();
  let gymCount=0;
  const days=['Mo','Di','Mi','Do','Fr','Sa','So'];
  let html=`<div class="month-header"><button class="month-nav" onclick="changeMonth(-1)"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg></button><span class="month-title">${monthName}</span><button class="month-nav" onclick="changeMonth(1)"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></button></div><div class="cal-grid">`;
  days.forEach(d=>html+=`<div class="cal-dayname">${d}</div>`);
  for(let i=0;i<offset;i++)html+=`<div class="cal-day empty"></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const date=new Date(y,m,d);const key=dk(date);
    const isGym=g.includes(key),isRest=r.includes(key),isToday=date.toDateString()===today.toDateString();
    if(isGym)gymCount++;
    html+=`<div class="cal-day${isGym?' gym':isRest?' rest':''}${isToday?' today':''}" onclick="toggleCalDay('${key}')">${d}</div>`;
  }
  html+=`</div><div class="month-stats"><div class="mstat"><div class="mstat-num">${gymCount}</div><div class="mstat-label">Gym-Tage</div></div><div class="mstat"><div class="mstat-num">${daysInMonth-gymCount}</div><div class="mstat-label">Frei</div></div><div class="mstat"><div class="mstat-num">${Math.round(gymCount/daysInMonth*100)}%</div><div class="mstat-label">Quote</div></div></div>`;
  document.getElementById('month-card').innerHTML=html;
}
function changeMonth(delta){calMonth=new Date(calMonth.getFullYear(),calMonth.getMonth()+delta,1);renderMonth();}
function toggleCalDay(key){
  let g=JSON.parse(localStorage.getItem('gym_gym')||'[]');let r=JSON.parse(localStorage.getItem('gym_rest')||'[]');
  if(!g.includes(key)&&!r.includes(key))g.push(key);
  else if(g.includes(key)){g=g.filter(x=>x!==key);r.push(key);}
  else r=r.filter(x=>x!==key);
  localStorage.setItem('gym_gym',JSON.stringify(g));localStorage.setItem('gym_rest',JSON.stringify(r));
  renderMonth();renderWeek();
}

// ── REST ──────────────────────────────────────────────────────────
function checkRestSuggestion(){
  const g=JSON.parse(localStorage.getItem('gym_gym')||'[]');
  const today=new Date();let cons=0;
  for(let i=1;i<=7;i++){const d=new Date(today);d.setDate(today.getDate()-i);if(g.includes(dk(d)))cons++;else break;}
  const banner=document.getElementById('rest-banner');
  if(banner)banner.style.display=cons>=3?'flex':'none';
}
function markRestToday(){
  const key=dk(new Date());let r=JSON.parse(localStorage.getItem('gym_rest')||'[]');
  if(!r.includes(key)){r.push(key);localStorage.setItem('gym_rest',JSON.stringify(r));}
  document.getElementById('rest-banner').style.display='none';renderWeek();showToast('Ruhetag markiert!');
}

// ── MUSCLE ────────────────────────────────────────────────────────
function renderMusclePage(){
  const saved=JSON.parse(localStorage.getItem('gym_history')||'[]');
  const todayKey=dk(new Date());
  const ws=getWeekStart(new Date());
  const wsKey=dk(ws);
  const we=new Date(ws);we.setDate(ws.getDate()+6);
  const weKey=dk(we);
  const thisWeek=saved.filter(s=>{
    const fd=s.fullDate||'';
    return fd>=wsKey&&fd<=weKey;
  });
  const counts={};ALL_MUSCLES.forEach(m=>counts[m]=0);
  thisWeek.forEach(s=>{
    const dk2=Object.keys(DAYS).find(k=>DAYS[k].name===s.day);
    if(!dk2)return;
    DAYS[dk2].exercises.forEach(ex=>{(ex.muscles||[]).forEach(m=>{counts[m]=(counts[m]||0)+1;});});
  });

  const hi=m=>counts[m]>0?MUSCLE_COLORS[m]:'#2a2a32';

  const legHTML=Object.entries(MUSCLE_COLORS).map(([m,c])=>`<div class="leg-row"><div class="leg-dot" style="background:${c};${counts[m]===0?'opacity:0.2':''}"></div><span style="${counts[m]===0?'color:var(--t3)':''}">${m} — ${counts[m]}x diese Woche</span></div>`).join('');
  document.getElementById('muscle-body-row').innerHTML=bodyHTML+`<div class="muscle-legend">${legHTML}</div>`;
  document.getElementById('muscle-bars').innerHTML=ALL_MUSCLES.map(m=>`<div class="mbar-row"><span class="mbar-label">${m}</span><div class="mbar-bg"><div class="mbar-fill" style="width:${Math.round(counts[m]/max*100)}%;background:${MUSCLE_COLORS[m]||currentColor}"></div></div><span class="mbar-num">${counts[m]}x</span></div>`).join('');
}

// ── MANAGE ────────────────────────────────────────────────────────
function switchManageDay(day){manageDay2=day;document.querySelectorAll('.manage-tab').forEach((t,i)=>t.classList.toggle('active',['push','pull','beine'][i]===day));renderManage();}
function renderManage(){
  const day=manageDay2,exes=DAYS[day].exercises;
  let html='<div class="ex-edit-card">';
  exes.forEach((ex,ei)=>{
    html+=`<div class="ex-edit-row" id="mer-${ei}">
      <div style="display:flex;flex-direction:column;gap:2px;flex-shrink:0">
        <button class="eabtn" onclick="moveEx('${day}',${ei},-1)" ${ei===0?'style="opacity:0.3;pointer-events:none"':''}>
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="18 15 12 9 6 15"/></svg>
        </button>
        <button class="eabtn" onclick="moveEx('${day}',${ei},1)" ${ei===exes.length-1?'style="opacity:0.3;pointer-events:none"':''}>
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
      </div>
      <input class="ex-edit-name" id="mename-${ei}" value="${ex.name}" readonly onchange="renameEx('${day}',${ei},this.value)"/>
      <div class="edit-actions">
        <div class="eabtn" onclick="startEdit(${ei})" id="edit-btn-${ei}"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></div>
        <div class="eabtn del-ex" onclick="deleteEx('${day}',${ei})"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg></div>
      </div></div>`;
  });
  html+=`<div class="add-ex-row" onclick="toggleAddEx()"><div class="add-ex-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></div><span class="add-ex-label" id="add-ex-label">Ubung hinzufuegen...</span><input class="add-ex-input" id="add-ex-input" placeholder="Name der Ubung..." onkeydown="addExKey(event,'${day}')"/></div></div>`;
  document.getElementById('manage-content').innerHTML=html;
}
function moveEx(day,ei,dir){
  const exes=DAYS[day].exercises;
  const newIdx=ei+dir;
  if(newIdx<0||newIdx>=exes.length)return;
  const tmp=exes[ei];exes[ei]=exes[newIdx];exes[newIdx]=tmp;
  delete state[day];saveDays();renderManage();initState(day);
}
function startEdit(ei){
  const inp=document.getElementById('mename-'+ei),btn=document.getElementById('edit-btn-'+ei);if(!inp)return;
  inp.readOnly=false;inp.classList.add('editing');inp.focus();inp.select();
  btn.innerHTML='<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>';
  btn.classList.add('save-edit');btn.onclick=()=>finishEdit(ei);inp.onkeydown=e=>{if(e.key==='Enter')finishEdit(ei);};
}
function finishEdit(ei){
  const inp=document.getElementById('mename-'+ei),btn=document.getElementById('edit-btn-'+ei);if(!inp)return;
  const newName=inp.value.trim()||DAYS[manageDay2].exercises[ei].name;
  DAYS[manageDay2].exercises[ei].name=newName;inp.value=newName;inp.readOnly=true;inp.classList.remove('editing');
  btn.innerHTML='<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>';
  btn.classList.remove('save-edit');btn.onclick=()=>startEdit(ei);
  delete state[manageDay2];saveDays();initState(manageDay2);showToast('Gespeichert!');
}
function deleteEx(day,ei){if(DAYS[day].exercises.length<=1){showToast('Mind. 1 Ubung');return;}DAYS[day].exercises.splice(ei,1);delete state[day];saveDays();renderManage();initState(day);showToast('Ubung entfernt');}
function toggleAddEx(){const inp=document.getElementById('add-ex-input'),lbl=document.getElementById('add-ex-label');if(inp.style.display==='block'){inp.style.display='none';lbl.style.display='';return;}inp.style.display='block';lbl.style.display='none';inp.focus();}
function addExKey(e,day){if(e.key==='Enter'){const val=document.getElementById('add-ex-input').value.trim();if(!val)return;DAYS[day].exercises.push({name:val,unit:'kg',muscles:[],pauseMins:3});delete state[day];saveDays();renderManage();initState(day);showToast('Ubung hinzugefuegt!');}}
function renameEx(day,ei,val){DAYS[day].exercises[ei].name=val;saveDays();}

// ── TIMERS ────────────────────────────────────────────────────────
let pauseIv=null,pauseLeft=180,pauseMax=180,pauseRunning=false;
let wtIv=null,wtSecs=0,wtRunning=false;
function fmt(s){return Math.floor(s/60)+':'+(s%60<10?'0':'')+s%60;}

function setPauseDuration(mins){
  pauseMax=Math.max(1,Math.min(10,mins))*60;
  if(!pauseRunning){pauseLeft=pauseMax;}
}
function syncPauseUI(){
  const pct=(Math.max(0,pauseLeft)/pauseMax*100)+'%';
  const val=pauseLeft<=0?'Los!':fmt(pauseLeft);
  const cls=pauseLeft<=0?'ft-display done':'ft-display';
  if(!ftFullscreen){
    const d=document.getElementById('ft-display');if(d){d.textContent=val;d.className=cls;}
    const f=document.getElementById('ft-fill');if(f)f.style.width=pct;
  } else {
    updateCircleArc();
  }
  const d2=document.getElementById('pause-display2');if(d2){d2.textContent=val;d2.className='tc-val'+(pauseLeft<=0?' done':'');}
  const f2=document.getElementById('pause-fill2');if(f2)f2.style.width=pct;
}
function togglePause(){
  if(pauseRunning){
    clearInterval(pauseIv);pauseRunning=false;
    ['ft-btn','pause-btn2'].forEach(id=>{const el=document.getElementById(id);if(el){el.textContent='Start';el.className=id==='ft-btn'?'ft-btn go':'tc-btn go';}});
  } else {
    pauseRunning=true;
    ['ft-btn','pause-btn2'].forEach(id=>{const el=document.getElementById(id);if(el){el.textContent='Stop';el.className=id==='ft-btn'?'ft-btn stop':'tc-btn stop';}});
    pauseIv=setInterval(()=>{
      pauseLeft=Math.max(0,pauseLeft-1);syncPauseUI();
      if(pauseLeft<=0){
        clearInterval(pauseIv);pauseRunning=false;
        ['ft-btn','pause-btn2'].forEach(id=>{const el=document.getElementById(id);if(el){el.textContent='Start';el.className=id==='ft-btn'?'ft-btn go':'tc-btn go';}});
        if(navigator.vibrate)navigator.vibrate([300,100,300,100,300]);
      }
    },1000);
  }
}
function resetPause(){
  clearInterval(pauseIv);pauseRunning=false;pauseLeft=pauseMax;syncPauseUI();
  ['ft-btn','pause-btn2'].forEach(id=>{const el=document.getElementById(id);if(el){el.textContent='Start';el.className=id==='ft-btn'?'ft-btn go':'tc-btn go';}});
}
function toggleWT(){
  if(wtRunning){
    clearInterval(wtIv);wtRunning=false;
    document.getElementById('wt-btn').textContent='Weiter';document.getElementById('wt-btn').className='tc-btn go';
  } else {
    wtRunning=true;
    document.getElementById('wt-btn').textContent='Pause';document.getElementById('wt-btn').className='tc-btn stop';
    wtIv=setInterval(()=>{wtSecs++;document.getElementById('wt-display').textContent=fmt(wtSecs);},1000);
  }
}
function resetWT(){clearInterval(wtIv);wtRunning=false;wtSecs=0;document.getElementById('wt-display').textContent='00:00';document.getElementById('wt-btn').textContent='Start';document.getElementById('wt-btn').className='tc-btn go';}

// ── WEEK / STREAK ─────────────────────────────────────────────────
function getWeekStart(date){const d=new Date(date);const dow=d.getDay();d.setDate(d.getDate()-((dow+6)%7));d.setHours(0,0,0,0);return d;}
function dk(d){const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),day=String(d.getDate()).padStart(2,'0');return`${y}-${m}-${day}`;}
function calcStreak(){
  const g=JSON.parse(localStorage.getItem('gym_gym')||'[]');if(!g.length)return 0;
  let streak=0,ws=getWeekStart(new Date());
  for(let w=0;w<52;w++){
    const we=new Date(ws);we.setDate(ws.getDate()+6);
    const wsKey=dk(ws),weKey=dk(we);
    const cnt=g.filter(d=>d>=wsKey&&d<=weKey).length;
    if(cnt>=3){streak++;}
    else if(w===0){/* current week still in progress — skip without breaking */}
    else{break;}
    ws=new Date(ws);ws.setDate(ws.getDate()-7);
  }
  return streak;
}
function renderWeek(){
  const days=['Mo','Di','Mi','Do','Fr','Sa','So'];
  const today=new Date(),monday=getWeekStart(today);
  const g=JSON.parse(localStorage.getItem('gym_gym')||'[]');
  const r=JSON.parse(localStorage.getItem('gym_rest')||'[]');
  const streak=calcStreak();
  document.getElementById('streak-num').textContent=streak;
  document.getElementById('streak-flames').innerHTML=streak>0?Array.from({length:Math.min(streak,5)},()=>'<span class="flame">🔥</span>').join(''):'';
  let consecutive=0;
  for(let i=1;i<=7;i++){const d=new Date(today);d.setDate(today.getDate()-i);if(g.includes(dk(d)))consecutive++;else break;}
  let html='';
  for(let i=0;i<7;i++){
    const d=new Date(monday);d.setDate(monday.getDate()+i);
    const k=dk(d);const isGym=g.includes(k),isRest=r.includes(k),isToday=d.toDateString()===today.toDateString();
    const suggestRest=isToday&&consecutive>=3&&!isGym&&!isRest;
    html+=`<div class="day-dot"><span class="day-name">${days[i]}</span><div class="day-circle${isGym?' gym':isRest?' rest':suggestRest?' suggest-rest':''}${isToday?' today':''}" onclick="toggleDay('${k}')">${isGym?'✓':isRest?'Z':d.getDate()}</div></div>`;
  }
  document.getElementById('week-days').innerHTML=html;
}
function toggleDay(key){
  let g=JSON.parse(localStorage.getItem('gym_gym')||'[]');let r=JSON.parse(localStorage.getItem('gym_rest')||'[]');
  if(!g.includes(key)&&!r.includes(key))g.push(key);
  else if(g.includes(key)){g=g.filter(x=>x!==key);r.push(key);}
  else r=r.filter(x=>x!==key);
  localStorage.setItem('gym_gym',JSON.stringify(g));localStorage.setItem('gym_rest',JSON.stringify(r));renderWeek();
}

// ── SAVE ──────────────────────────────────────────────────────────
function saveWorkout(){
  const day=currentDay;const saved=JSON.parse(localStorage.getItem('gym_history')||'[]');
  const now=new Date(),key=dk(now);
  let g=JSON.parse(localStorage.getItem('gym_gym')||'[]');
  // FIX: only mark today, not tomorrow
  if(!g.includes(key)){g.push(key);localStorage.setItem('gym_gym',JSON.stringify(g));}
  saved.unshift({day:DAYS[day].name,date:now.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric'}),fullDate:key,duration:fmt(wtSecs),exercises:DAYS[day].exercises.map((ex,ei)=>({name:ex.name,note:state[day][ei].note,sets:state[day][ei].sets.map(s=>({weight:s.weight,reps:s.reps}))}))});
  if(saved.length>40)saved.splice(40);
  localStorage.setItem('gym_history',JSON.stringify(saved));
  // reset checked state
  state[day].forEach(ex=>ex.sets.forEach(s=>s.done=false));
  Object.values(charts).forEach(c=>{try{c.destroy();}catch(e){}});charts={};openCards={};
  render();renderHistory();renderWeek();drawOvChart();showToast('Workout gespeichert!');
}

// ── HISTORY ───────────────────────────────────────────────────────
function renderHistory(){
  const saved=JSON.parse(localStorage.getItem('gym_history')||'[]');
  const el=document.getElementById('history-list');if(!el)return;
  if(!saved.length){el.innerHTML='<p style="font-size:13px;color:var(--t3);padding:6px 0">Noch keine Einheiten gespeichert.</p>';return;}
  el.innerHTML=saved.slice(0,10).map((e,i)=>{
    const rows=e.exercises.map(ex=>{const s=ex.sets.map((s,si)=>`S${si+1}: ${s.weight>0?s.weight+'kg×':''}${s.reps}`).join(' · ');return`<div class="hist-row"><span style="font-weight:600">${ex.name}</span><span>${s}</span></div>`;}).join('');
    return`<div class="hist-card"><div class="hist-head"><div><span class="hist-day">${e.day}</span> <span class="hist-date">${e.date}${e.duration?' · '+e.duration:''}</span></div><button class="hist-del" onclick="openModal(${i})"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>${rows}</div>`;
  }).join('');
}
function openModal(i){deleteIndex=i;document.getElementById('modal-bg').classList.add('open');}
function closeModal(){deleteIndex=null;document.getElementById('modal-bg').classList.remove('open');}
function confirmDelete(){if(deleteIndex===null)return;const saved=JSON.parse(localStorage.getItem('gym_history')||'[]');saved.splice(deleteIndex,1);localStorage.setItem('gym_history',JSON.stringify(saved));closeModal();renderHistory();showToast('Einheit geloscht');}

// ── CSV ───────────────────────────────────────────────────────────
function exportCSV(){
  const saved=JSON.parse(localStorage.getItem('gym_history')||'[]');if(!saved.length){showToast('Keine Daten');return;}
  let csv='Datum,Tag,Dauer,Ubung,Satz,Gewicht,Wdh,Notiz\n';
  saved.forEach(e=>e.exercises.forEach(ex=>ex.sets.forEach((s,si)=>{csv+=`"${e.date}","${e.day}","${e.duration||''}","${ex.name}",${si+1},${s.weight},${s.reps},"${(ex.note||'').replace(/"/g,'""')}"\n`;})));
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'}));a.download='gym-export.csv';a.click();showToast('CSV exportiert!');
}

// ── TOAST ─────────────────────────────────────────────────────────
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2400);}

// ── INIT ──────────────────────────────────────────────────────────
const savedTheme=localStorage.getItem('gym_theme')||'dark';
document.documentElement.setAttribute('data-theme',savedTheme);
updateThemeIcon();
applyColor(currentColor,currentColorText);
initState('push');render();renderWeek();
setTimeout(drawOvChart,200);
</script>
